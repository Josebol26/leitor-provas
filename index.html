<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Pro 2026 - Scanner Sensível</title>
    
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="cv['onRuntimeInitialized']=()=>{window.cvReady=true; console.log('OpenCV Pronto');}"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #3b82f6;
            --success: #22c55e;
            --danger: #ef4444;
        }

        body { 
            background: var(--bg); 
            color: #f1f5f9; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        #video-container { 
            position: relative; 
            width: 100vw; 
            height: 55vh; 
            background: #000;
            border-bottom: 2px solid #334155;
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .overlay-aim {
            position: absolute;
            top: 50%; left: 50%;
            width: 250px; height: 250px;
            border: 2px solid rgba(59, 130, 246, 0.5);
            transform: translate(-50%, -50%);
            border-radius: 20px;
            pointer-events: none;
        }

        .ui-panel { 
            padding: 15px; 
            width: 90%; 
            max-width: 500px; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        #status-card { 
            padding: 15px; 
            border-radius: 12px; 
            background: var(--card); 
            border: 2px solid #334155; 
            text-align: center;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .is-success { border-color: var(--success) !important; background: #064e3b !important; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

        button { 
            background: #334155; 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-torch { background: #475569; }
        .btn-reload { background: #1e293b; border: 1px solid #334155; }

        .debug-info {
            font-family: monospace;
            font-size: 11px;
            color: #94a3b8;
            margin-top: 5px;
            background: rgba(0,0,0,0.3);
            padding: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="overlay-aim"></div>
</div>

<div class="ui-panel">
    <div id="status-card">
        <div id="msg">Aguardando QR Code...</div>
    </div>

    <div class="controls">
        <button class="btn-torch" onclick="alternarLanterna()">🔦 LANTERNA</button>
        <button class="btn-reload" onclick="location.reload()">🔄 RESET</button>
    </div>
    <div style="font-size: 10px; color: #64748b; text-align: center;">
        Toque na tela após a leitura para escanear o próximo aluno.
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusCard = document.getElementById('status-card');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let processando = false;
    let lanternaAtiva = false;

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
    }).then(stream => { 
        video.srcObject = stream; 
        video.play(); 
        requestAnimationFrame(tick); 
    });

    async function alternarLanterna() {
        const track = video.srcObject.getVideoTracks()[0];
        try {
            lanternaAtiva = !lanternaAtiva;
            await track.applyConstraints({ advanced: [{ torch: lanternaAtiva }] });
        } catch (e) { alert("Lanterna não disponível"); }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !processando) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code) {
                corrigir(code);
            }
        }
        requestAnimationFrame(tick);
    }

    function corrigir(qr) {
        if (!window.cvReady) return;
        processando = true;

        try {
            let src = cv.imread(canvas);
            let gray = new cv.Mat();
            let thresh = new cv.Mat();
            
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            // FILTROS DE LUMINOSIDADE E SENSIBILIDADE
            cv.GaussianBlur(gray, gray, new cv.Size(5, 5), 0); 
            // Adaptive Threshold mais sensível (bloco 11, constante 2)
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

            // DILATAÇÃO: Engrossa a marcação da caneta
            let M = cv.Mat.ones(3, 3, cv.CV_8U);
            cv.dilate(thresh, thresh, M);

            const loc = qr.location;
            const d_qr = Math.sqrt(Math.pow(loc.topLeftCorner.x - loc.topRightCorner.x, 2) + Math.pow(loc.topLeftCorner.y - loc.topRightCorner.y, 2));

            // Calibragem Geométrica (Sistema José Luiz)
            let start_x = loc.topLeftCorner.x - (d_qr * 1.74);
            let start_y = loc.topLeftCorner.y + (d_qr * 2.05);
            let esp_lin = d_qr * 0.340;
            let esp_col = d_qr * 0.625;
            let raio = Math.round(d_qr * 0.16);

            let partes = qr.data.split('|');
            let nome = "Aluno";
            let gabarito = "";
            partes.forEach(p => {
                if(p.startsWith("AL:")) nome = p.replace("AL:", "").trim();
                if(p.startsWith("GB:")) gabarito = p.replace("GB:", "").trim();
            });

            let acertos = 0;
            let detectado = "";
            const alts = ['A', 'B', 'C', 'D', 'E'];

            for (let q = 0; q < 15; q++) {
                let y_at = Math.round(start_y + (q * esp_lin));
                let max_v = -1; let sel = -1;

                for (let a = 0; a < 5; a++) {
                    let x_at = Math.round(start_x + (a * esp_col));
                    let rx = Math.round(x_at - raio);
                    let ry = Math.round(y_at - raio);

                    if (rx > 0 && ry > 0 && (rx + raio*2) < thresh.cols && (ry + raio*2) < thresh.rows) {
                        let rect = new cv.Rect(rx, ry, raio*2, raio*2);
                        let roi = thresh.roi(rect);
                        let count = cv.countNonZero(roi); 
                        if (count > max_v) { max_v = count; sel = a; }
                        roi.delete();
                    }
                }

                // LIMITE DE SENSIBILIDADE (0.6): Detecta até marcações parciais
                if (max_v > (raio * raio * 0.6)) { 
                    detectado += alts[sel];
                    if (gabarito && q < gabarito.length && alts[sel] === gabarito[q].toUpperCase()) {
                        acertos++;
                    }
                } else {
                    detectado += "_";
                }
            }

            statusCard.classList.add('is-success');
            statusCard.innerHTML = `
                <div style="font-size:18px; font-weight:bold;">${nome}</div>
                <div style="font-size:32px; color:var(--success);">${acertos}/15</div>
                <div class="debug-info">Lido: ${detectado}</div>
                <div class="debug-info">Gabarito: ${gabarito}</div>
            `;

            src.delete(); gray.delete(); thresh.delete(); M.delete();
        } catch (e) {
            console.error(e);
            processando = false;
        }
    }

    // Resetar para próxima leitura ao tocar no card ou vídeo
    window.onclick = () => { 
        if(processando) {
            processando = false; 
            statusCard.classList.remove('is-success');
            statusCard.innerHTML = '<div id="msg">Aguardando QR Code...</div>';
        }
    };
</script>
</body>
</html>
