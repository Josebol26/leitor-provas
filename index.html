<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0e1419;
            --border: #1e2a35;
            --accent: #00e5ff;
            --accent2: #00ff9d;
            --danger: #ff3d5a;
            --text: #e8f0f5;
            --muted: #4a6070;
            --card: #111922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: #000; color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }

        /* Vídeo ocupa tela toda como base */
        #video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        /* Canvas sobreposto, mesmo tamanho CSS que o video */
        #canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .overlay-bottom {
            position: fixed; bottom: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(to top, rgba(8,12,16,0.93) 30%, transparent);
            z-index: 2; pointer-events: none;
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 12px;
            background: linear-gradient(to bottom, rgba(8,12,16,0.95), transparent);
        }
        .logo { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; }
        .logo span { color: var(--muted); }

        /* Mira central */
        .mira {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -65%);
            width: 200px; height: 200px;
            z-index: 3; pointer-events: none; transition: opacity 0.3s;
        }
        .mira.oculta { opacity: 0; }
        .mira-corner { position: absolute; width: 28px; height: 28px; border-color: var(--accent); border-style: solid; opacity: 0.9; }
        .mira-corner.tl { top:0; left:0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .mira-corner.tr { top:0; right:0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .mira-corner.bl { bottom:0; left:0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .mira-corner.br { bottom:0; right:0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }
        .mira-scan { position: absolute; top:0; left:0; right:0; height:2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: scan 2s ease-in-out infinite; }
        @keyframes scan { 0%{top:0;opacity:1} 90%{top:100%;opacity:1} 100%{top:100%;opacity:0} }

        /* Painel inferior */
        .painel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 0 16px 24px; }

        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 100px; padding: 7px 14px;
            font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
            margin-bottom: 16px; transition: all 0.3s;
        }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
        .status-pill.scanning .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.2s ease-in-out infinite; }
        .status-pill.ready .status-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
        .status-pill.frozen .status-dot { background: #ffd600; box-shadow: 0 0 8px #ffd600; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

        .card-resultado {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; margin-bottom: 14px;
            display: none; animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1);
        }
        .card-resultado.visivel { display: block; }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
        .nome-aluno { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
        .nota-wrap { display: flex; align-items: baseline; gap: 6px; }
        .nota-num { font-family: 'Space Mono', monospace; font-size: 52px; font-weight: 700; line-height: 1; color: var(--accent2); letter-spacing: -2px; }
        .nota-den { font-family: 'Space Mono', monospace; font-size: 22px; color: var(--muted); }
        .barra-progresso { margin-top: 14px; height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
        .barra-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }

        .btn-row { display: flex; gap: 10px; }
        .btn { flex:1; height:52px; border:none; border-radius:14px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; letter-spacing:0.05em; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn:active { transform: scale(0.97); }
        .btn-capturar { background: var(--accent); color: var(--bg); }
        .btn-capturar:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
        .btn-proximo { background: var(--accent2); color: var(--bg); display: none; }

        /* Botão histórico */
        .historico-btn {
            position: fixed; top: 16px; right: 20px; z-index: 11;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 8px 12px;
            font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
            cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .historico-btn:hover { border-color: var(--accent); color: var(--accent); }
        .historico-count { background: var(--accent); color: var(--bg); border-radius: 4px; padding: 1px 6px; font-weight: 700; font-size: 10px; }

        /* Toast */
        .toast {
            position: fixed; top: 70px; left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--accent2); color: var(--bg);
            padding: 10px 20px; border-radius: 100px;
            font-weight: 700; font-size: 13px; z-index: 20;
            opacity: 0; transition: all 0.3s; pointer-events: none; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Drawer */
        .drawer { position: fixed; inset: 0; z-index: 30; display: none; }
        .drawer.aberto { display: block; }
        .drawer-bg { position: absolute; inset: 0; background: rgba(8,12,16,0.8); backdrop-filter: blur(4px); }
        .drawer-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            border-radius: 24px 24px 0 0; padding: 20px 20px 40px;
            max-height: 70vh; overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .drawer-handle { width: 40px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 20px; }
        .drawer-titulo { font-size: 18px; font-weight: 800; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .drawer-titulo span { color: var(--muted); font-size: 13px; font-weight: 400; }
        .historico-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .historico-item:last-child { border-bottom: none; }
        .hist-nome { font-size: 14px; font-weight: 600; }
        .hist-nota { font-family: 'Space Mono', monospace; font-size: 16px; color: var(--accent2); }
        .hist-pct { font-size: 11px; color: var(--muted); margin-top: 2px; }
        .drawer-vazio { text-align: center; padding: 40px 0; color: var(--muted); font-size: 14px; }
        .btn-exportar {
            width: 100%; margin-top: 16px; height: 46px;
            background: transparent; border: 1px solid var(--border); border-radius: 12px;
            color: var(--text); font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
            cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-exportar:hover { border-color: var(--accent2); color: var(--accent2); }

        /* Calibração */
        .calib-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
        .calib-row label { width: 80px; text-align: right; flex-shrink: 0; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 10px; }
        .calib-row input[type=range] { flex: 1; accent-color: var(--accent); }
        .calib-row .cval { width: 52px; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--accent); flex-shrink: 0; }
        .calib-secao { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.1em; border-bottom: 1px solid var(--border); margin: 12px 0 8px; padding-bottom: 4px; }
        .btn-calib-abrir {
            position: fixed; bottom: 100px; right: 16px; z-index: 11;
            background: var(--card); border: 1px solid var(--border); border-radius: 10px;
            padding: 8px 10px; font-size: 18px; cursor: pointer; transition: all 0.2s; line-height: 1;
        }
        .btn-calib-abrir:hover { border-color: var(--accent); }
    </style>
</head>
<body>

<!-- Vídeo visível como base, canvas renderiza por cima -->
<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div class="overlay-bottom"></div>

<div class="header">
    <div class="logo">OMR<span>/</span>SCAN</div>
</div>

<button class="historico-btn" onclick="abrirDrawer()">
    📋 <span id="hist-count-label">0</span>
    <span class="historico-count" id="hist-badge">0</span>
</button>

<div class="mira" id="mira">
    <div class="mira-corner tl"></div>
    <div class="mira-corner tr"></div>
    <div class="mira-corner bl"></div>
    <div class="mira-corner br"></div>
    <div class="mira-scan"></div>
</div>

<div class="toast" id="toast"></div>

<div class="painel">
    <div class="status-pill scanning" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-txt">AGUARDANDO QR CODE</span>
    </div>
    <div class="card-resultado" id="card-resultado">
        <div class="nome-aluno" id="res-nome">—</div>
        <div class="nota-wrap">
            <div class="nota-num" id="res-acertos">—</div>
            <div class="nota-den" id="res-total">/ —</div>
        </div>
        <div class="barra-progresso">
            <div class="barra-fill" id="barra-fill" style="width:0%"></div>
        </div>
    </div>
    <div class="btn-row">
        <button class="btn btn-capturar" id="btn-capturar" onclick="capturar()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M3 9a2 2 0 0 1 2-2h1l2-2h8l2 2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            CAPTURAR
        </button>
        <button class="btn btn-proximo" id="btn-proximo" onclick="proximo()">
            PRÓXIMO
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>
</div>

<button class="btn-calib-abrir" onclick="abrirCalib()">⚙️</button>

<!-- Drawer Histórico -->
<div class="drawer" id="drawer">
    <div class="drawer-bg" onclick="fecharDrawer()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">Resultados da Sessão <span id="drawer-resumo"></span></div>
        <div id="drawer-lista"><div class="drawer-vazio">Nenhuma prova corrigida ainda.</div></div>
        <button class="btn-exportar" onclick="exportarCSV()">⬇️ Exportar CSV</button>
    </div>
</div>

<!-- Drawer Calibração -->
<div class="drawer" id="drawer-calib">
    <div class="drawer-bg" onclick="fecharCalib()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">Calibração</div>
        <div class="calib-secao">Posição inicial</div>
        <div class="calib-row"><label>Offset X</label><input type="range" id="c_offsetX" min="-4" max="0" step="0.005" value="-2.175" oninput="syncCalib('offsetX',this,3,'c_v_offsetX')"><span class="cval" id="c_v_offsetX">-2.175</span></div>
        <div class="calib-row"><label>Offset Y</label><input type="range" id="c_offsetY" min="-1" max="3" step="0.005" value="1.560" oninput="syncCalib('offsetY',this,3,'c_v_offsetY')"><span class="cval" id="c_v_offsetY">1.560</span></div>
        <div class="calib-secao">Espaçamento</div>
        <div class="calib-row"><label>Gap H</label><input type="range" id="c_gapH" min="0.1" max="1.0" step="0.001" value="0.611" oninput="syncCalib('gapH',this,3,'c_v_gapH')"><span class="cval" id="c_v_gapH">0.611</span></div>
        <div class="calib-row"><label>Gap V</label><input type="range" id="c_gapV" min="0.1" max="0.8" step="0.001" value="0.335" oninput="syncCalib('gapV',this,3,'c_v_gapV')"><span class="cval" id="c_v_gapV">0.335</span></div>
        <div class="calib-row"><label>Col Gap</label><input type="range" id="c_colGap" min="0.5" max="3.0" step="0.005" value="1.680" oninput="syncCalib('colGap',this,3,'c_v_colGap')"><span class="cval" id="c_v_colGap">1.680</span></div>
        <div class="calib-secao">Detecção</div>
        <div class="calib-row"><label>Threshold</label><input type="range" id="c_thresh" min="50" max="250" step="1" value="81" oninput="syncCalib('threshold',this,0,'c_v_thresh')"><span class="cval" id="c_v_thresh">81</span></div>
        <button class="btn-exportar" onclick="copiarConfig()">📋 Copiar valores</button>
    </div>
</div>

<script>
    const video       = document.getElementById('video');
    const canvas      = document.getElementById('canvas');
    const ctx         = canvas.getContext('2d');
    const mira        = document.getElementById('mira');
    const statusPill  = document.getElementById('status-pill');
    const statusTxt   = document.getElementById('status-txt');
    const cardRes     = document.getElementById('card-resultado');
    const resNome     = document.getElementById('res-nome');
    const resAcertos  = document.getElementById('res-acertos');
    const resTotal    = document.getElementById('res-total');
    const barraFill   = document.getElementById('barra-fill');
    const btnCapturar = document.getElementById('btn-capturar');
    const btnProximo  = document.getElementById('btn-proximo');

    let congelado = false;
    let dadosAtuais = null;
    let imagemCongelada = null;
    let historico = [];

    // Suavização QR
    const SMOOTH_N = 5;
    let qrBuffer = [];
    let framesSerQR = 0;
    const DEBOUNCE = 8;

    const config = {
        offsetX: -2.175, offsetY: 1.560,
        gapH: 0.611, gapV: 0.335,
        colGap: 1.680, threshold: 81
    };

    function smoothQR(code) {
        qrBuffer.push({
            tl: {...code.location.topLeftCorner},
            tr: {...code.location.topRightCorner},
            bl: {...code.location.bottomLeftCorner},
            br: {...code.location.bottomRightCorner},
        });
        if (qrBuffer.length > SMOOTH_N) qrBuffer.shift();
        const n = qrBuffer.length;
        const avg = (k, a) => qrBuffer.reduce((s, q) => s + q[k][a], 0) / n;
        return {
            location: {
                topLeftCorner:     {x: avg('tl','x'), y: avg('tl','y')},
                topRightCorner:    {x: avg('tr','x'), y: avg('tr','y')},
                bottomLeftCorner:  {x: avg('bl','x'), y: avg('bl','y')},
                bottomRightCorner: {x: avg('br','x'), y: avg('br','y')},
            },
            data: code.data
        };
    }

    function setStatus(estado, texto) {
        statusPill.className = 'status-pill ' + estado;
        statusTxt.innerText = texto;
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ── CÂMERA ──
    async function iniciarCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: {ideal: "environment"} }
            });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                requestAnimationFrame(tick);
            };
        } catch (err) {
            setStatus('', 'ERRO: ' + err.name);
            alert("Erro câmera: " + err.message);
        }
    }
    iniciarCamera();

    // ── LOOP ──
    let ultimoQR = 0;
    function tick(ts) {
        if (congelado) return;
        requestAnimationFrame(tick);
        if (video.readyState < 2) return;

        // Ajusta canvas ao tamanho real do vídeo
        if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
            canvas.width  = video.videoWidth  || 640;
            canvas.height = video.videoHeight || 480;
        }

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        // Limita leitura do QR a ~10fps
        if (ts - ultimoQR < 100) return;
        ultimoQR = ts;

        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imgData.data, canvas.width, canvas.height);

        if (code && code.data.includes('|GB:')) {
            framesSerQR = 0;
            const match = code.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
            if (match) {
                const qrS = smoothQR(code);
                processar(qrS, match[2], match[1], false, imgData);
                dadosAtuais = { code: qrS, gabarito: match[2], nome: match[1] };
                setStatus('ready', 'QR DETECTADO ✓');
                mira.classList.add('oculta');
                btnCapturar.disabled = false;
            }
        } else {
            framesSerQR++;
            if (framesSerQR >= DEBOUNCE && dadosAtuais) {
                dadosAtuais = null;
                qrBuffer = [];
                btnCapturar.disabled = true;
                setStatus('scanning', 'AGUARDANDO QR CODE');
                mira.classList.remove('oculta');
                cardRes.classList.remove('visivel');
            }
        }
    }

    // ── CAPTURAR ──
    function capturar() {
        if (!dadosAtuais) return;
        congelado = true;
        btnCapturar.style.display = 'none';
        btnProximo.style.display = 'block';
        setStatus('frozen', 'CONGELADO');
        imagemCongelada = ctx.getImageData(0, 0, canvas.width, canvas.height);
        processar(dadosAtuais.code, dadosAtuais.gabarito, dadosAtuais.nome, true, imagemCongelada);
    }

    // ── PRÓXIMO ──
    function proximo() {
        congelado = false;
        dadosAtuais = null;
        imagemCongelada = null;
        qrBuffer = [];
        framesSerQR = 0;
        btnCapturar.style.display = 'block';
        btnCapturar.disabled = true;
        btnProximo.style.display = 'none';
        cardRes.classList.remove('visivel');
        mira.classList.remove('oculta');
        setStatus('scanning', 'AGUARDANDO QR CODE');
        requestAnimationFrame(tick);
    }

    // ── PROCESSAR ──
    function processar(qr, gabarito, nome, finalizar, pixelData) {
        const tl = qr.location.topLeftCorner;
        const tr = qr.location.topRightCorner;
        const bl = qr.location.bottomLeftCorner;
        const br = qr.location.bottomRightCorner;

        const qrW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
        const qrH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
        const size = (qrW + qrH) / 2;
        const cx   = (tl.x + br.x) / 2;
        const cy   = (tl.y + br.y) / 2;

        // Vetores reais dos lados do QR (correção de perspectiva)
        const ux = (tr.x-tl.x)/qrW, uy = (tr.y-tl.y)/qrW;
        const vx = (bl.x-tl.x)/qrH, vy = (bl.y-tl.y)/qrH;

        const data = pixelData.data;
        const W = pixelData.width, H = pixelData.height;
        let acertos = 0;

        for (let i = 0; i < gabarito.length; i++) {
            const col  = Math.floor(i / 30);
            const lin  = i % 30;
            const bx   = config.offsetX + col * config.colGap;
            const by   = config.offsetY + lin * config.gapV;

            let marcada = -1, maxEsc = 0;

            for (let alt = 0; alt < 5; alt++) {
                const nx = bx + alt * config.gapH;
                const ny = by;
                const x  = cx + nx * size * ux + ny * size * vx;
                const y  = cy + nx * size * uy + ny * size * vy;

                if (x < 1 || x > W-2 || y < 1 || y > H-2) continue;

                let esc = 0;
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const px  = Math.floor(x+dx);
                        const py  = Math.floor(y+dy);
                        const idx = (py * W + px) * 4;
                        esc += 255 - ((data[idx] + data[idx+1] + data[idx+2]) / 3);
                    }
                }
                esc /= 9;

                const marcadaEsta = esc > config.threshold;
                const correta = String.fromCharCode(65+alt) === gabarito[i];

                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI*2);
                ctx.fillStyle = marcadaEsta
                    ? (correta ? 'rgba(0,255,157,0.88)' : 'rgba(255,61,90,0.88)')
                    : 'rgba(255,255,255,0.18)';
                ctx.fill();

                ctx.fillStyle = marcadaEsta ? '#080c10' : 'rgba(255,255,255,0.55)';
                ctx.font = 'bold 7px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String.fromCharCode(65+alt), x, y);

                if (marcadaEsta && esc > maxEsc) { maxEsc = esc; marcada = alt; }
            }
            if (marcada !== -1 && String.fromCharCode(65+marcada) === gabarito[i]) acertos++;
        }

        if (finalizar) {
            const total = gabarito.length;
            const pct   = Math.round((acertos/total)*100);
            resNome.innerText     = nome;
            resAcertos.innerText  = acertos;
            resTotal.innerText    = `/ ${total}`;
            barraFill.style.width = pct + '%';
            cardRes.classList.add('visivel');
            const idx = historico.findIndex(h => h.nome === nome);
            const entrada = {nome, acertos, total, pct};
            if (idx >= 0) historico[idx] = entrada; else historico.push(entrada);
            atualizarBadge();
        }
    }

    // ── CALIBRAÇÃO ──
    function syncCalib(key, input, dec, spanId) {
        config[key] = parseFloat(input.value);
        document.getElementById(spanId).innerText = config[key].toFixed(dec);
        if (congelado && dadosAtuais && imagemCongelada) {
            ctx.putImageData(imagemCongelada, 0, 0);
            processar(dadosAtuais.code, dadosAtuais.gabarito, dadosAtuais.nome, true, imagemCongelada);
        }
    }
    function abrirCalib()  { document.getElementById('drawer-calib').classList.add('aberto'); }
    function fecharCalib() { document.getElementById('drawer-calib').classList.remove('aberto'); }
    function copiarConfig() {
        const txt = `offsetX:${config.offsetX.toFixed(3)}, offsetY:${config.offsetY.toFixed(3)}, gapH:${config.gapH.toFixed(3)}, gapV:${config.gapV.toFixed(3)}, colGap:${config.colGap.toFixed(3)}, threshold:${config.threshold}`;
        navigator.clipboard.writeText(txt).catch(()=>{});
        showToast('Valores copiados!');
    }

    // ── HISTÓRICO ──
    function atualizarBadge() {
        document.getElementById('hist-badge').innerText = historico.length;
        document.getElementById('hist-count-label').innerText = historico.length;
    }
    function abrirDrawer() {
        const lista = document.getElementById('drawer-lista');
        const resumo = document.getElementById('drawer-resumo');
        if (!historico.length) {
            lista.innerHTML = '<div class="drawer-vazio">Nenhuma prova corrigida ainda.</div>';
            resumo.innerText = '';
        } else {
            const media = Math.round(historico.reduce((s,h) => s+h.pct, 0) / historico.length);
            resumo.innerText = `média ${media}%`;
            lista.innerHTML = historico.slice().sort((a,b) => b.acertos-a.acertos).map(h => `
                <div class="historico-item">
                    <div><div class="hist-nome">${h.nome}</div><div class="hist-pct">${h.pct}% de acerto</div></div>
                    <div class="hist-nota">${h.acertos}<span style="color:var(--muted);font-size:12px">/${h.total}</span></div>
                </div>`).join('');
        }
        document.getElementById('drawer').classList.add('aberto');
    }
    function fecharDrawer() { document.getElementById('drawer').classList.remove('aberto'); }

    // ── CSV ──
    function exportarCSV() {
        if (!historico.length) { showToast('Nenhum resultado ainda'); return; }
        const linhas = ['Nome,Acertos,Total,Porcentagem'];
        historico.forEach(h => linhas.push(`"${h.nome}",${h.acertos},${h.total},${h.pct}%`));
        const blob = new Blob([linhas.join('\n')], {type:'text/csv;charset=utf-8;'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'resultados_omr.csv'; a.click();
        URL.revokeObjectURL(url);
        showToast('CSV exportado!');
    }
</script>
</body>
</html>
