<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Pro - Sistema Completo</title>
    
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="cv['onRuntimeInitialized']=()=>{window.cvReady=true; console.log('OpenCV Pronto');}"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; --danger: #ef4444; }
        body { background: var(--bg); color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #video-container { position: relative; width: 100vw; height: 45vh; background: #000; border-bottom: 3px solid var(--accent); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .scan-line { 
            position: absolute; width: 100%; height: 2px; background: var(--accent); 
            box-shadow: 0 0 15px var(--accent); top: 50%; animation: scan 4s infinite linear; 
        }
        @keyframes scan { 0% { top: 10%; } 100% { top: 90%; } }

        .ui-panel { padding: 15px; width: 95%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        #status-card { 
            padding: 15px; border-radius: 12px; background: var(--card); border: 2px solid #334155; 
            text-align: center; min-height: 150px; cursor: pointer; transition: 0.3s;
        }
        .is-success { border-color: var(--success) !important; background: #064e3b !important; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { background: #334155; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.9em; }
        
        .btn-discard { background: var(--danger); }
        .btn-report { background: var(--accent); grid-column: span 2; padding: 15px; font-size: 1.1em; }
        .btn-exit { background: #475569; grid-column: span 2; margin-top: 5px; opacity: 0.8; }
        
        .debug-lido { font-family: monospace; font-size: 11px; color: #94a3b8; background: rgba(0,0,0,0.4); padding: 8px; border-radius: 5px; margin-top: 8px; word-break: break-all; }

        /* Modal de Relatório */
        #modal-relatorio { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; color: black; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; z-index: 1000; }
        #conteudo-pdf { padding: 15px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
        th { background: #f8f9fa; }
        .no-print-area { display: flex; flex-direction: column; gap: 10px; margin-top: 30px; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="scan-line"></div>
</div>

<div class="ui-panel">
    <div id="status-card" onclick="salvarResultado()">
        <div id="msg">Aguardando QR Code da Prova...</div>
    </div>

    <div class="controls">
        <button onclick="alternarLanterna()">🔦 LANTERNA</button>
        <button class="btn-discard" onclick="descartarLeitura()">❌ DESCARTAR</button>
        <button class="btn-report" onclick="gerarRelatorio()">📊 RELATÓRIO FINAL (<span id="count-salvos">0</span>)</button>
        <button class="btn-exit" onclick="finalizarSessao()">🚪 SAIR / FINALIZAR</button>
    </div>
</div>

<div id="modal-relatorio">
    <div id="conteudo-pdf">
        <h2 style="color: #1e293b; margin-bottom: 0;">Relatório de Notas</h2>
        <hr>
        <p><strong>Turma:</strong> <span id="nome-turma-pdf">---</span></p>
        <p><strong>Data:</strong> <span id="data-pdf"></span></p>
        <div id="tabela-container"></div>
    </div>
    
    <div class="no-print-area">
        <button onclick="exportarPDF()" style="background: var(--success); color: white; padding: 15px;">💾 BAIXAR RELATÓRIO (PDF)</button>
        <button onclick="fecharRelatorio()" style="background: #64748b; color: white; padding: 12px;">⬅️ VOLTAR AO SCANNER</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusCard = document.getElementById('status-card');
    const countSpan = document.getElementById('count-salvos');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let processando = false;
    let lanternaAtiva = false;
    let bancoDeDados = []; 
    let resultadoAtual = null;

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } }).then(stream => { 
        video.srcObject = stream; video.play(); requestAnimationFrame(tick); 
    });

    async function alternarLanterna() {
        const track = video.srcObject.getVideoTracks()[0];
        try { lanternaAtiva = !lanternaAtiva; await track.applyConstraints({ advanced: [{ torch: lanternaAtiva }] }); } catch (e) { alert("Flash não suportado."); }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !processando) {
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);
            if (code) { processando = true; setTimeout(() => corrigir(code), 200); }
        }
        requestAnimationFrame(tick);
    }

    function corrigir(qr) {
        if (!window.cvReady) return;
        try {
            let src = cv.imread(canvas);
            let gray = new cv.Mat(); let thresh = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 19, 7);

            const loc = qr.location;
            const d_qr = Math.sqrt(Math.pow(loc.topLeftCorner.x - loc.topRightCorner.x, 2) + Math.pow(loc.topLeftCorner.y - loc.topRightCorner.y, 2));

            // Coordenadas Calibradas
            let start_x = loc.topLeftCorner.x - (d_qr * 1.74);
            let start_y = loc.topLeftCorner.y + (d_qr * 2.05);
            let esp_lin = d_qr * 0.340; let esp_col = d_qr * 0.625; let raio = Math.round(d_qr * 0.16);

            let partes = qr.data.split('|');
            let nome = "Aluno"; let gabarito = "";
            partes.forEach(p => { 
                if(p.startsWith("AL:")) nome = p.replace("AL:", "").trim(); 
                if(p.startsWith("GB:")) gabarito = p.replace("GB:", "").trim(); 
            });

            // LÓGICA DINÂMICA: O total de questões é o tamanho do gabarito do QR
            let totalQ = gabarito.length > 0 ? gabarito.length : 15;
            let acertos = 0;
            let lidoString = "";
            const alts = ['A', 'B', 'C', 'D', 'E'];

            for (let q = 0; q < totalQ; q++) {
                let y_at = Math.round(start_y + (q * esp_lin));
                let max_v = -1; let sel = -1;
                for (let a = 0; a < 5; a++) {
                    let x_at = Math.round(start_x + (a * esp_col));
                    let rx = Math.round(x_at - raio); let ry = Math.round(y_at - raio);
                    if (rx > 0 && ry > 0 && (rx + raio*2) < thresh.cols && (ry + raio*2) < thresh.rows) {
                        let rect = new cv.Rect(rx, ry, raio*2, raio*2);
                        let roi = thresh.roi(rect); let count = cv.countNonZero(roi); 
                        if (count > max_v) { max_v = count; sel = a; }
                        roi.delete();
                    }
                }
                if (max_v > (raio * raio * 1.1)) { 
                    lidoString += alts[sel];
                    if (gabarito && q < gabarito.length && alts[sel] === gabarito[q].toUpperCase()) acertos++;
                } else { lidoString += "_"; }
            }

            // Cálculo da Nota 0 a 10 Proporcional
            let notaFinal = ((acertos / totalQ) * 10).toFixed(1);

            resultadoAtual = { nome: nome, acertos: acertos, total: totalQ, nota: notaFinal, seq: lidoString };

            statusCard.classList.add('is-success');
            statusCard.innerHTML = `
                <div style="font-weight:bold; font-size:1.2em;">${nome}</div>
                <div style="font-size:2em; margin:5px 0;">${acertos}/${totalQ}</div>
                <div style="font-size:1.5em; background:white; color:black; display:inline-block; padding:2px 10px; border-radius:5px;">NOTA: ${notaFinal}</div>
                <div class="debug-lido">LIDO: ${lidoString}</div>
                <div style="margin-top:10px; font-size:12px; font-weight:bold; color:#fff;">TOQUE PARA SALVAR</div>
            `;

            src.delete(); gray.delete(); thresh.delete();
        } catch (e) { processando = false; }
    }

    function salvarResultado() {
        if (resultadoAtual) {
            bancoDeDados.push(resultadoAtual);
            resultadoAtual = null; processando = false;
            countSpan.innerText = bancoDeDados.length;
            statusCard.classList.remove('is-success');
            statusCard.innerHTML = '<div>✅ Nota Gravada!</div>';
            setTimeout(() => { if(!processando) statusCard.innerHTML = '<div>Aguardando Próxima...</div>'; }, 800);
        }
    }

    function descartarLeitura() {
        resultadoAtual = null; processando = false;
        statusCard.classList.remove('is-success');
        statusCard.innerHTML = '<div>❌ Leitura Descartada.</div>';
        setTimeout(() => { if(!processando) statusCard.innerHTML = '<div>Aguardando Próxima...</div>'; }, 800);
    }

    function gerarRelatorio() {
        if (bancoDeDados.length === 0) { alert("Nenhum dado salvo."); return; }
        const turma = prompt("Nome da Turma:");
        if (turma === null) return;

        document.getElementById('nome-turma-pdf').innerText = turma;
        document.getElementById('data-pdf').innerText = new Date().toLocaleDateString('pt-BR');

        // ORDENAÇÃO ALFABÉTICA
        bancoDeDados.sort((a, b) => a.nome.localeCompare(b.nome));

        const container = document.getElementById('tabela-container');
        let html = "<table><tr><th>Aluno</th><th>Acertos</th><th>Nota (0-10)</th></tr>";
        bancoDeDados.forEach(item => {
            html += `<tr><td>${item.nome}</td><td>${item.acertos}/${item.total}</td><td><b>${item.nota}</b></td></tr>`;
        });
        html += "</table>";
        container.innerHTML = html;
        document.getElementById('modal-relatorio').style.display = 'block';
    }

    function exportarPDF() {
        const elemento = document.getElementById('conteudo-pdf');
        const turma = document.getElementById('nome-turma-pdf').innerText;
        html2pdf().set({ 
            margin: 10, filename: `Notas_${turma}.pdf`, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        }).from(elemento).save();
    }

    function finalizarSessao() {
        if(confirm("Deseja realmente sair? Isso limpará todas as notas não salvas em PDF!")) {
            location.reload();
        }
    }

    function fecharRelatorio() { document.getElementById('modal-relatorio').style.display = 'none'; }
</script>
</body>
</html>
