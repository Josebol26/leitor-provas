<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuGerador - Scanner Ultra</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="cv['onRuntimeInitialized']=()=>{window.cvReady=true; console.log('CV Pronto');}"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #video-container { position: relative; width: 90vw; height: 50vh; margin-top: 20px; border: 2px solid #228B22; border-radius: 15px; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; border: 10px solid rgba(0,0,0,0.3); box-sizing: border-box; }
        .controls { padding: 20px; width: 100%; text-align: center; }
        #status { padding: 20px; border-radius: 10px; background: #1e1e1e; border: 2px solid #333; font-size: 1.2rem; min-height: 60px; }
        .success { border-color: #228B22 !important; background: #1b5e20 !important; color: white; }
        button { background: #444; color: white; border: none; padding: 15px; border-radius: 10px; margin-top: 10px; width: 80%; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="overlay"></div>
</div>

<div class="controls">
    <div id="status">Iniciando câmera e motores...</div>
    <button onclick="location.reload()">REINICIAR SCANNER</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } })
        .then(stream => { video.srcObject = stream; video.play(); requestAnimationFrame(tick); });

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !window.pausar) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            // O jsQR é muito mais sensível que o OpenCV para detectar o código
            const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });

            if (code) {
                console.log("QR Localizado!");
                processarOMR(code);
            } else {
                status.innerText = "Aponte para o QR Code da Prova";
                status.classList.remove('success');
            }
        }
        requestAnimationFrame(tick);
    }

    function processarOMR(qr) {
        if (!window.cvReady) return;
        window.pausar = true; // Para o vídeo para processar a nota

        try {
            let src = cv.imread(canvas);
            let gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            // Coordenadas do QR Code vindas do jsQR
            const loc = qr.location;
            const p0x = loc.topLeftCorner.x;
            const p0y = loc.topLeftCorner.y;
            const p1x = loc.topRightCorner.x;
            const p1y = loc.topRightCorner.y;

            let larg_qr = Math.sqrt(Math.pow(p0x - p1x, 2) + Math.pow(p0y - p1y, 2));

            // --- SUA CALIBRAGEM V3.3 ---
            let start_x = p0x - (larg_qr * 1.74);
            let start_y = p0y + (larg_qr * 2.05);
            let esp_lin = larg_qr * 0.340;
            let esp_col = larg_qr * 0.625;
            let raio = Math.round(larg_qr * 0.16);

            let thresh = new cv.Mat();
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

            let acertos = 0;
            let partes = qr.data.split('|');
            let aluno = partes[0].replace("AL:", "");
            let gabarito = partes[1] ? partes[1].replace("GB:", "").trim() : "";
            const alternativas = ['A', 'B', 'C', 'D', 'E'];

            for (let q = 0; q < 15; q++) {
                let y_at = Math.round(start_y + (q * esp_lin));
                let max_pix = -1; let sel = -1;

                for (let a = 0; a < 5; a++) {
                    let x_at = Math.round(start_x + (a * esp_col));
                    let rx = x_at - raio; let ry = y_at - raio;

                    if (rx > 0 && ry > 0 && (rx + raio*2) < thresh.cols && (ry + raio*2) < thresh.rows) {
                        let rect = new cv.Rect(rx, ry, raio*2, raio*2);
                        let roi = thresh.roi(rect);
                        let count = cv.countNonZero(roi);
                        if (count > max_pix) { max_pix = count; sel = a; }
                        roi.delete();
                    }
                }
                if (max_pix > (raio * raio * 1.8)) {
                    if (gabarito && q < gabarito.length && alternativas[sel] === gabarito[q]) acertos++;
                }
            }

            status.classList.add('success');
            status.innerHTML = `✅ <b>${aluno}</b><br>NOTA: ${acertos}/15<br><small>Toque na tela para o próximo</small>`;
            
            // Limpeza
            src.delete(); gray.delete(); thresh.delete();
        } catch (e) {
            console.error(e);
            window.pausar = false;
        }
    }

    // Clique na tela para continuar corrigindo
    window.onclick = () => { window.pausar = false; status.classList.remove('success'); };
</script>
</body>
</html>
