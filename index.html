<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner MeuGerador V7</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { padding: 10px; background: #1e1e1e; width: 100%; text-align: center; color: #228B22; font-size: 14px; }
        #video-container { position: relative; width: 90vw; height: 50vh; margin-top: 10px; border: 2px solid #444; border-radius: 12px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .target { position: absolute; top: 10%; right: 10%; width: 80px; height: 80px; border: 3px solid #00ff00; border-radius: 5px; box-shadow: 0 0 15px #00ff00; opacity: 0.8; }
        .controls { padding: 15px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #status { width: 85%; padding: 15px; border-radius: 8px; text-align: center; background: #1e1e1e; font-size: 1.1rem; border: 2px solid #333; }
        .btn-scan { background: #228B22; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; width: 85%; font-weight: bold; }
        .success { border-color: #228B22 !important; background: #1b5e20 !important; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="header">FOQUE O QR CODE NO QUADRADO VERDE</div>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="target"></div>
</div>

<div class="controls">
    <div id="status">Carregando motor...</div>
    <button class="btn-scan" onclick="corrigir()">FORÇAR LEITURA</button>
</div>

<canvas id="canvasInput"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvasInput');
    let cvReady = false;

    function onOpenCvReady() {
        cvReady = true;
        status.innerText = "Motor Pronto! Aponte para a prova.";
        // Iniciar loop de detecção automática a cada 1 segundo
        setInterval(detectarAutomatico, 1000);
    }

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } } 
    }).then(stream => {
        video.srcObject = stream;
        video.play();
    });

    function detectarAutomatico() {
        if (!cvReady || status.classList.contains('success')) return;
        corrigir(true); // Modo silencioso
    }

    function corrigir(silencioso = false) {
        if (!cvReady || video.readyState < 2) return;
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        let src, gray, points, detector;
        try {
            src = cv.imread(canvas);
            gray = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            // MELHORIA: Aumenta contraste para o QR Code
            cv.equalizeHist(gray, gray);

            detector = new cv.QRCodeDetector();
            points = new cv.Mat();
            let code = detector.decode(gray, points);

            if (code && points.cols > 0) {
                processarNota(code, points, gray, src);
            } else if (!silencioso) {
                status.innerText = "QR Code não detectado. Tente outro ângulo.";
            }
        } catch (e) {
            console.log(e);
        } finally {
            if (src) src.delete(); if (gray) gray.delete();
            if (points) points.delete(); if (detector) detector.delete();
        }
    }

    function processarNota(code, points, gray, src) {
        try {
            let p0x = points.floatAt(0, 0);
            let p0y = points.floatAt(0, 1);
            let p1x = points.floatAt(0, 2);
            let p1y = points.floatAt(0, 3);
            let larg_qr = Math.sqrt(Math.pow(p0x - p1x, 2) + Math.pow(p0y - p1y, 2));

            // CALIBRAGEM V3.3
            let start_x = p0x - (larg_qr * 1.74);
            let start_y = p0y + (larg_qr * 2.05);
            let esp_lin = larg_qr * 0.340;
            let esp_col = larg_qr * 0.625;
            let raio = Math.max(1, Math.round(larg_qr * 0.16));

            let thresh = new cv.Mat();
            cv.adaptiveThreshold(gray, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

            let acertos = 0;
            let dados = code.split('|');
            let aluno = dados[0].replace("AL:", "");
            let gabarito = dados[1] ? dados[1].replace("GB:", "").trim() : "";
            const alternativas = ['A', 'B', 'C', 'D', 'E'];

            for (let q = 0; q < 15; q++) {
                let y_at = Math.round(start_y + (q * esp_lin));
                let max_count = -1;
                let sel_idx = -1;

                for (let a = 0; a < 5; a++) {
                    let x_at = Math.round(start_x + (a * esp_col));
                    let rx = x_at - raio; let ry = y_at - raio;
                    if (rx > 0 && ry > 0 && (rx + raio*2) < thresh.cols && (ry + raio*2) < thresh.rows) {
                        let rect = new cv.Rect(rx, ry, raio*2, raio*2);
                        let roi = thresh.roi(rect);
                        let count = cv.countNonZero(roi);
                        if (count > max_count) { max_count = count; sel_idx = a; }
                        roi.delete();
                    }
                }
                if (max_count > (raio * raio * 1.5)) {
                    if (gabarito && q < gabarito.length && alternativas[sel_idx] === gabarito[q]) acertos++;
                }
            }

            status.className = "success";
            status.innerHTML = `✅ <b>${aluno}</b><br>NOTA: ${acertos}/15`;
            thresh.delete();
            
            // Toca um som de sucesso (opcional)
            navigator.vibrate(200); 
        } catch (e) {
            status.innerText = "Erro ao calcular bolinhas.";
        }
    }
</script>
</body>
</html>
