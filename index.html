<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR — Diagnóstico</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#080c10; --surface:#0e1419; --border:#1e2a35;
            --accent:#00e5ff; --accent2:#00ff9d; --danger:#ff3d5a;
            --text:#e8f0f5; --muted:#52687a; --card:#111922;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:grid; grid-template-columns:260px 1fr; overflow:hidden; }

        .sidebar { background:var(--surface); border-right:1px solid var(--border); padding:20px 16px; display:flex; flex-direction:column; gap:14px; overflow-y:auto; }
        .brand { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.2em; color:var(--accent); }
        h1 { font-size:16px; font-weight:800; margin-top:4px; line-height:1.3; }
        h1 em { color:var(--accent2); font-style:normal; }

        .sec { font-size:9px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); border-bottom:1px solid var(--border); padding-bottom:4px; margin-bottom:6px; }

        .upload-zone { border:2px dashed var(--border); border-radius:10px; padding:16px 10px; text-align:center; cursor:pointer; transition:all .2s; background:var(--bg); position:relative; }
        .upload-zone:hover { border-color:var(--accent); }
        .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
        .upload-lbl { font-size:12px; font-weight:700; color:var(--accent); margin-top:4px; }
        .upload-sub { font-size:10px; color:var(--muted); margin-top:2px; }

        /* Slider threshold */
        .thresh-wrap { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; }
        .thresh-row { display:flex; align-items:center; gap:8px; margin-top:6px; }
        .thresh-row input { flex:1; accent-color:var(--accent); }
        .thresh-row span { font-family:'Space Mono',monospace; font-size:12px; color:var(--accent); width:28px; text-align:right; }

        /* Nav páginas */
        .nav-row { display:flex; gap:6px; align-items:center; }
        .nav-btn { flex:1; padding:7px; border:1px solid var(--border); border-radius:7px; background:transparent; color:var(--text); font-family:'Syne',sans-serif; font-weight:700; font-size:11px; cursor:pointer; transition:all .2s; text-align:center; }
        .nav-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
        .nav-btn:disabled { opacity:.3; cursor:not-allowed; }
        .pag-lbl { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); text-align:center; min-width:40px; }

        /* Info QR */
        .info-box { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-family:'Space Mono',monospace; font-size:10px; line-height:1.8; }
        .ok { color:var(--accent2); } .err { color:var(--danger); } .muted { color:var(--muted); }

        /* Resultado */
        .res-grande { font-family:'Space Mono',monospace; font-size:32px; font-weight:700; color:var(--accent2); }
        .res-nome { font-size:11px; color:var(--muted); margin-top:2px; word-break:break-all; }

        /* Legenda */
        .legenda { display:flex; flex-wrap:wrap; gap:6px; }
        .leg { display:flex; align-items:center; gap:4px; font-size:10px; }
        .ldot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }

        /* Botões */
        .btn-primary { width:100%; padding:11px; border:none; border-radius:9px; background:var(--accent2); color:var(--bg); font-family:'Syne',sans-serif; font-weight:800; font-size:13px; cursor:pointer; transition:all .2s; margin-top:auto; }
        .btn-primary:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
        .btn-primary:not(:disabled):hover { filter:brightness(1.1); }

        /* Canvas area */
        .canvas-area { position:relative; overflow:auto; background:#0a0a0a; display:flex; }
        #canvas { display:block; flex-shrink:0; cursor:crosshair; }

        .zoom-bar { position:absolute; bottom:14px; right:14px; display:flex; gap:5px; z-index:10; }
        .zbtn { width:32px; height:32px; border:1px solid var(--border); border-radius:7px; background:rgba(14,20,25,.9); color:var(--text); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .zbtn:hover { border-color:var(--accent); }
        .zlbl { height:32px; padding:0 8px; border:1px solid var(--border); border-radius:7px; background:rgba(14,20,25,.9); color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; display:flex; align-items:center; }

        /* Loading */
        .loading { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(8,12,16,.8); z-index:20; font-size:14px; color:var(--muted); display:none; }
        .loading.show { display:flex; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div>
        <div class="brand">OMR<span style="color:var(--muted)">/</span>DIAG</div>
        <h1>Diagnóstico<br><em>Visual</em></h1>
    </div>

    <div>
        <div class="sec">PDF ou Imagem</div>
        <div class="upload-zone" id="upload-zone">
            <input type="file" accept="application/pdf,image/*" id="file-input">
            <div style="font-size:24px">📄</div>
            <div class="upload-lbl" id="upload-lbl">Abrir arquivo</div>
            <div class="upload-sub" id="upload-sub">PDF ou JPG/PNG</div>
        </div>
    </div>

    <div>
        <div class="sec">Página</div>
        <div class="nav-row">
            <button class="nav-btn" id="btn-prev" onclick="mudarPag(-1)" disabled>◀</button>
            <span class="pag-lbl" id="pag-lbl">— / —</span>
            <button class="nav-btn" id="btn-next" onclick="mudarPag(+1)" disabled>▶</button>
        </div>
    </div>

    <div>
        <div class="sec">QR Code</div>
        <div class="info-box" id="qr-info"><span class="muted">Aguardando...</span></div>
    </div>

    <div>
        <div class="sec">Threshold de detecção</div>
        <div class="thresh-wrap">
            <div style="font-size:11px;color:var(--muted)">Suba até as bolinhas marcadas ficarem <span style="color:var(--accent2)">verdes</span> e as vazias ficarem brancas.</div>
            <div class="thresh-row">
                <input type="range" id="sl-thresh" min="5" max="150" value="30" oninput="atualizarThresh(this.value)">
                <span id="v-thresh">30</span>
            </div>
        </div>
    </div>

    <div>
        <div class="sec">Legenda</div>
        <div class="legenda">
            <div class="leg"><div class="ldot" style="background:#00ff9d"></div>Certa</div>
            <div class="leg"><div class="ldot" style="background:#ff3d5a"></div>Errada</div>
            <div class="leg"><div class="ldot" style="background:rgba(255,255,255,.2)"></div>Vazia</div>
            <div class="leg"><div class="ldot" style="background:#ffd600;border-radius:2px"></div>QR</div>
        </div>
    </div>

    <div>
        <div class="sec">Resultado</div>
        <div class="res-grande" id="res-nota">— / —</div>
        <div class="res-nome" id="res-nome">—</div>
    </div>

    <button class="btn-primary" id="btn-copiar" onclick="copiarThresh()" disabled>📋 Copiar threshold final</button>
</aside>

<div class="canvas-area" id="canvas-area">
    <div class="loading" id="loading">Processando...</div>
    <canvas id="canvas"></canvas>
    <div class="zoom-bar">
        <button class="zbtn" onclick="setZoom(escala-0.25)">−</button>
        <span class="zlbl" id="zoom-lbl">100%</span>
        <button class="zbtn" onclick="setZoom(escala+0.25)">+</button>
        <button class="zbtn" onclick="zoomFit()">⊡</button>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Calibração ──
const cfg = {
    colsX:    [-1.915, -1.573, -1.154, -0.598, -0.036],
    offsetY:   0.883,
    gapV:      0.435,
    threshold: 30
};

let imgAtual = null, qrAtual = null;
let pdfDoc = null, pagAtual = 1, totalPags = 1;
let escala = 1;

const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d', { willReadFrequently:true });

// ── Upload ──
document.getElementById('file-input').addEventListener('change', async e => {
    const f = e.target.files[0];
    if (!f) return;
    document.getElementById('upload-lbl').innerText = f.name;
    document.getElementById('upload-sub').innerText = 'Carregando...';
    if (f.type === 'application/pdf') await abrirPDF(f);
    else await abrirImagem(f);
});

const zone = document.getElementById('canvas-area');
zone.addEventListener('dragover', e => e.preventDefault());
zone.addEventListener('drop', async e => {
    e.preventDefault();
    const f = e.dataTransfer.files[0];
    if (!f) return;
    if (f.type === 'application/pdf') await abrirPDF(f);
    else await abrirImagem(f);
});

async function abrirPDF(f) {
    const buf = await f.arrayBuffer();
    pdfDoc    = await pdfjsLib.getDocument({ data: buf }).promise;
    totalPags = pdfDoc.numPages;
    pagAtual  = 1;
    document.getElementById('pag-lbl').innerText = `${pagAtual} / ${totalPags}`;
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = totalPags <= 1;
    await renderPag(pagAtual);
}

async function abrirImagem(f) {
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = async () => {
        const off  = new OffscreenCanvas(img.width, img.height);
        off.getContext('2d').drawImage(img, 0, 0);
        imgAtual = off.getContext('2d').getImageData(0, 0, img.width, img.height);
        URL.revokeObjectURL(url);
        aposCarregar();
    };
    img.src = url;
}

async function renderPag(n) {
    mostrarLoading(true);
    const page = await pdfDoc.getPage(n);
    const vp   = page.getViewport({ scale: 2.0 });
    const off  = new OffscreenCanvas(vp.width, vp.height);
    await page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise;
    imgAtual = off.getContext('2d').getImageData(0, 0, vp.width, vp.height);
    aposCarregar();
    mostrarLoading(false);
}

function aposCarregar() {
    canvas.width  = imgAtual.width;
    canvas.height = imgAtual.height;
    ctx.putImageData(imgAtual, 0, 0);
    qrAtual = jsQR(imgAtual.data, imgAtual.width, imgAtual.height);
    atualizarQRInfo();
    zoomFit();
    redesenhar();
}

function mudarPag(d) {
    const n = pagAtual + d;
    if (n < 1 || n > totalPags) return;
    pagAtual = n;
    document.getElementById('pag-lbl').innerText  = `${pagAtual} / ${totalPags}`;
    document.getElementById('btn-prev').disabled  = pagAtual <= 1;
    document.getElementById('btn-next').disabled  = pagAtual >= totalPags;
    renderPag(pagAtual);
}

// ── Info QR ──
function atualizarQRInfo() {
    const el = document.getElementById('qr-info');
    if (!qrAtual) { el.innerHTML = '<span class="err">❌ QR não encontrado</span>'; return; }
    const m = qrAtual.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
    if (!m) { el.innerHTML = `<span class="err">❌ Formato inválido</span><br><span class="muted">${qrAtual.data.slice(0,30)}</span>`; return; }
    el.innerHTML = `<span class="ok">✓ QR lido</span><br><span class="muted">Aluno: </span>${m[1]}<br><span class="muted">Gabarito: </span>${m[2]}<br><span class="muted">Questões: </span>${m[2].length}`;
}

// ── Threshold ──
function atualizarThresh(v) {
    cfg.threshold = parseInt(v);
    document.getElementById('v-thresh').innerText = v;
    if (imgAtual) redesenhar();
}

// ── Redesenha ──
function redesenhar() {
    if (!imgAtual) return;
    ctx.putImageData(imgAtual, 0, 0);
    if (!qrAtual) return;

    const m = qrAtual.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
    if (!m) return;
    const gabarito = m[2], nome = m[1];

    const tl = qrAtual.location.topLeftCorner,    tr = qrAtual.location.topRightCorner;
    const bl = qrAtual.location.bottomLeftCorner, br = qrAtual.location.bottomRightCorner;
    const qrW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
    const qrH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
    const size = (qrW + qrH) / 2;
    const cx   = (tl.x + br.x) / 2, cy = (tl.y + br.y) / 2;
    const ux = (tr.x-tl.x)/qrW, uy = (tr.y-tl.y)/qrW;
    const vx = (bl.x-tl.x)/qrH, vy = (bl.y-tl.y)/qrH;

    // QR border
    ctx.strokeStyle = '#ffd600'; ctx.lineWidth = Math.max(2, size*0.02);
    ctx.beginPath();
    ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y);
    ctx.closePath(); ctx.stroke();

    const d = imgAtual.data, W = imgAtual.width, H = imgAtual.height;
    const R  = Math.max(8, Math.round(size * 0.055));
    const AM = Math.max(3, Math.round(R * 0.5));
    let acertos = 0;

    for (let i = 0; i < gabarito.length; i++) {
        const lin = i % 30;
        const ny  = cfg.offsetY + lin * cfg.gapV;
        let marcada = -1, maxEsc = 0;

        // Detecta marcada
        for (let alt = 0; alt < 5; alt++) {
            const nx = cfg.colsX[alt];
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x<0||x>=W||y<0||y>=H) continue;
            let esc=0, cnt=0;
            for (let dx=-AM;dx<=AM;dx++) for (let dy=-AM;dy<=AM;dy++) {
                const px=Math.min(Math.max(Math.floor(x+dx),0),W-1);
                const py=Math.min(Math.max(Math.floor(y+dy),0),H-1);
                const idx=(py*W+px)*4;
                esc += 255-((d[idx]+d[idx+1]+d[idx+2])/3);
                cnt++;
            }
            esc/=cnt;
            if (esc > cfg.threshold && esc > maxEsc) { maxEsc=esc; marcada=alt; }
        }

        // Desenha todas as bolinhas
        for (let alt = 0; alt < 5; alt++) {
            const nx = cfg.colsX[alt];
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x<-100||x>W+100||y<-100||y>H+100) continue;

            const correta = String.fromCharCode(65+alt) === gabarito[i];
            const marcadaEsta = alt === marcada;

            ctx.beginPath(); ctx.arc(x, y, R, 0, Math.PI*2);
            ctx.fillStyle = marcadaEsta
                ? (correta ? 'rgba(0,255,157,.85)' : 'rgba(255,61,90,.85)')
                : 'rgba(255,255,255,.18)';
            ctx.fill();
            ctx.strokeStyle = marcadaEsta ? (correta?'#00ff9d':'#ff3d5a') : 'rgba(255,255,255,.2)';
            ctx.lineWidth = 1.5; ctx.stroke();

            ctx.fillStyle = marcadaEsta ? '#080c10' : 'rgba(255,255,255,.55)';
            ctx.font = `bold ${Math.max(8, Math.round(R*.8))}px monospace`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(String.fromCharCode(65+alt), x, y);
        }

        // Número da questão
        const nx0 = cfg.colsX[0] - 0.35;
        const xn = cx + nx0*size*ux + ny*size*vx;
        const yn = cy + nx0*size*uy + ny*size*vy;
        ctx.fillStyle = 'rgba(0,229,255,.7)';
        ctx.font = `bold ${Math.max(7, Math.round(R*.65))}px monospace`;
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillText(String(i+1).padStart(2,'0'), xn, yn);

        if (marcada !== -1 && String.fromCharCode(65+marcada) === gabarito[i]) acertos++;
    }

    document.getElementById('res-nota').innerText = `${acertos} / ${gabarito.length}`;
    document.getElementById('res-nome').innerText = nome;
    document.getElementById('btn-copiar').disabled = false;
    aplicarZoom();
}

// ── Zoom ──
function setZoom(z) {
    escala = Math.max(0.1, Math.min(4, z));
    canvas.style.transform = `scale(${escala})`;
    canvas.style.transformOrigin = 'top left';
    canvas.style.margin = '16px';
    document.getElementById('zoom-lbl').innerText = Math.round(escala*100)+'%';
}
function zoomFit() {
    const a = document.getElementById('canvas-area');
    setZoom(Math.min((a.clientWidth-32)/canvas.width, (a.clientHeight-32)/canvas.height, 1));
}
function aplicarZoom() {
    canvas.style.transform = `scale(${escala})`;
    canvas.style.transformOrigin = 'top left';
    canvas.style.margin = '16px';
}

// ── Loading ──
function mostrarLoading(s) { document.getElementById('loading').classList.toggle('show', s); }

// ── Copiar threshold ──
function copiarThresh() {
    const txt = `threshold: ${cfg.threshold}`;
    navigator.clipboard.writeText(txt).then(() => {
        const b = document.getElementById('btn-copiar');
        b.innerText = '✅ Copiado!';
        setTimeout(() => b.innerText = '📋 Copiar threshold final', 2000);
    });
}
</script>
</body>
</html>
