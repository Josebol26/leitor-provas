<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10; --surface: #0e1419; --border: #1e2a35;
            --accent: #00e5ff; --accent2: #00ff9d; --danger: #ff3d5a;
            --text: #e8f0f5; --muted: #4a6070; --card: #111922;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: #000; color: var(--text); overflow: hidden; height: 100vh; width: 100vw; }

        #video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        #canvas { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; filter: brightness(1.2) contrast(1.05); }

        .overlay-bottom {
            position: fixed; bottom: 0; left: 0; right: 0; height: 45%;
            background: linear-gradient(to top, rgba(8,12,16,0.93) 30%, transparent);
            z-index: 2; pointer-events: none;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 20px 12px;
            background: linear-gradient(to bottom, rgba(8,12,16,0.95), transparent);
        }
        .logo { font-family: 'Space Mono', monospace; font-size: 13px; letter-spacing: 0.15em; color: var(--accent); }
        .logo span { color: var(--muted); }
        .header-btns { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 10px; font-size: 16px; cursor: pointer; color: white; line-height: 1; transition: all 0.2s;
        }
        .icon-btn:hover { border-color: var(--accent); }
        .icon-btn.active { border-color: #ffd600; background: rgba(255,214,0,0.15); }

        /* Status principal */
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 100px; padding: 7px 14px;
            font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
            margin-bottom: 14px; transition: all 0.3s;
        }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); transition: all 0.3s; }
        .status-pill.scanning .status-dot { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1.2s infinite; }
        .status-pill.pronto   .status-dot { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }
        .status-pill.frozen   .status-dot { background: #ffd600; box-shadow: 0 0 8px #ffd600; }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }

        /* Card resultado */
        .card-resultado {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 18px; margin-bottom: 12px;
            display: none; animation: slideUp .35s cubic-bezier(.16,1,.3,1);
        }
        .card-resultado.visivel { display: block; }
        @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
        .nome-aluno { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
        .nota-wrap { display:flex; align-items:baseline; gap:6px; }
        .nota-num { font-family:'Space Mono',monospace; font-size:50px; font-weight:700; line-height:1; color:var(--accent2); letter-spacing:-2px; }
        .nota-den { font-family:'Space Mono',monospace; font-size:20px; color:var(--muted); }
        .barra-progresso { margin-top:12px; height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
        .barra-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .6s cubic-bezier(.16,1,.3,1); }

        .painel { position:fixed; bottom:0; left:0; right:0; z-index:10; padding:0 16px 24px; }
        .btn-row { display:flex; gap:10px; }
        .btn { flex:1; height:52px; border:none; border-radius:14px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn:active { transform:scale(.97); }
        .btn-capturar { background:var(--accent); color:var(--bg); }
        .btn-capturar:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
        .btn-proximo { background:var(--accent2); color:var(--bg); display:none; }

        /* Botões fixos */
        .historico-btn {
            position:fixed; top:16px; right:20px; z-index:11;
            background:var(--card); border:1px solid var(--border);
            border-radius:10px; padding:8px 12px;
            font-family:'Space Mono',monospace; font-size:11px; color:var(--muted);
            cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s;
        }
        .historico-btn:hover { border-color:var(--accent); color:var(--accent); }
        .historico-count { background:var(--accent); color:var(--bg); border-radius:4px; padding:1px 6px; font-weight:700; font-size:10px; }
        .btn-calib-abrir { position:fixed; bottom:105px; right:16px; z-index:11; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 10px; font-size:18px; cursor:pointer; transition:all .2s; line-height:1; }
        .btn-calib-abrir:hover { border-color:var(--accent); }

        /* Toast */
        .toast { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-10px); background:var(--accent2); color:var(--bg); padding:10px 20px; border-radius:100px; font-weight:700; font-size:13px; z-index:20; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        /* Drawers */
        .drawer { position:fixed; inset:0; z-index:30; display:none; }
        .drawer.aberto { display:block; }
        .drawer-bg { position:absolute; inset:0; background:rgba(8,12,16,.8); backdrop-filter:blur(4px); }
        .drawer-panel { position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); border-radius:24px 24px 0 0; padding:20px 20px 40px; max-height:75vh; overflow-y:auto; animation:slideUp .3s cubic-bezier(.16,1,.3,1); }
        .drawer-handle { width:40px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 20px; }
        .drawer-titulo { font-size:18px; font-weight:800; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
        .drawer-titulo span { color:var(--muted); font-size:13px; font-weight:400; }
        .historico-item { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
        .historico-item:last-child { border-bottom:none; }
        .hist-nome { font-size:14px; font-weight:600; }
        .hist-nota { font-family:'Space Mono',monospace; font-size:16px; color:var(--accent2); }
        .hist-pct { font-size:11px; color:var(--muted); margin-top:2px; }
        .drawer-vazio { text-align:center; padding:40px 0; color:var(--muted); font-size:14px; }
        .btn-exportar { width:100%; margin-top:16px; height:46px; background:transparent; border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Syne',sans-serif; font-weight:600; font-size:13px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-exportar:hover { border-color:var(--accent2); color:var(--accent2); }

        /* Calibração */
        .calib-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .calib-row label { width:75px; text-align:right; flex-shrink:0; color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; }
        .calib-row input[type=range] { flex:1; accent-color:var(--accent); }
        .calib-row .cval { width:52px; font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); flex-shrink:0; }
        .calib-secao { font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.1em; border-bottom:1px solid var(--border); margin:12px 0 8px; padding-bottom:4px; }
    </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div class="overlay-bottom"></div>

<div class="header">
    <div class="logo">OMR<span>/</span>SCAN</div>
    <div class="header-btns">
        <button class="icon-btn" id="btn-flash" onclick="toggleFlash()">💡</button>
        <button class="historico-btn" onclick="abrirDrawer()">
            📋 <span id="hist-count-label">0</span>
            <span class="historico-count" id="hist-badge">0</span>
        </button>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="painel">
    <div class="status-pill scanning" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-txt">APONTE PARA A FOLHA</span>
    </div>
    <div class="card-resultado" id="card-resultado">
        <div class="nome-aluno" id="res-nome">—</div>
        <div class="nota-wrap">
            <div class="nota-num" id="res-acertos">—</div>
            <div class="nota-den" id="res-total">/ —</div>
        </div>
        <div class="barra-progresso"><div class="barra-fill" id="barra-fill" style="width:0%"></div></div>
    </div>
    <div class="btn-row">
        <button class="btn btn-capturar" id="btn-capturar" onclick="capturar()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M3 9a2 2 0 0 1 2-2h1l2-2h8l2 2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            CAPTURAR
        </button>
        <button class="btn btn-proximo" id="btn-proximo" onclick="proximo()">
            PRÓXIMO
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>
</div>

<button class="btn-calib-abrir" onclick="abrirCalib()">⚙️</button>

<!-- Drawer Histórico -->
<div class="drawer" id="drawer">
    <div class="drawer-bg" onclick="fecharDrawer()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">Resultados <span id="drawer-resumo"></span></div>
        <div id="drawer-lista"><div class="drawer-vazio">Nenhuma prova ainda.</div></div>
        <button class="btn-exportar" onclick="exportarCSV()">⬇️ Exportar CSV</button>
    </div>
</div>

<!-- Drawer Calibração -->
<div class="drawer" id="drawer-calib">
    <div class="drawer-bg" onclick="fecharCalib()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">Calibração</div>
        <div class="calib-secao">Posição</div>
        <div class="calib-row"><label>Offset X</label><input type="range" id="c_offsetX" min="-4" max="0" step="0.005" value="-2.175" oninput="syncCalib('offsetX',this,3,'c_v_offsetX')"><span class="cval" id="c_v_offsetX">-2.175</span></div>
        <div class="calib-row"><label>Offset Y</label><input type="range" id="c_offsetY" min="-1" max="3" step="0.005" value="1.560" oninput="syncCalib('offsetY',this,3,'c_v_offsetY')"><span class="cval" id="c_v_offsetY">1.560</span></div>
        <div class="calib-secao">Espaçamento</div>
        <div class="calib-row"><label>Gap H</label><input type="range" id="c_gapH" min="0.1" max="1.0" step="0.001" value="0.611" oninput="syncCalib('gapH',this,3,'c_v_gapH')"><span class="cval" id="c_v_gapH">0.611</span></div>
        <div class="calib-row"><label>Gap V</label><input type="range" id="c_gapV" min="0.1" max="0.8" step="0.001" value="0.335" oninput="syncCalib('gapV',this,3,'c_v_gapV')"><span class="cval" id="c_v_gapV">0.335</span></div>
        <div class="calib-row"><label>Col Gap</label><input type="range" id="c_colGap" min="0.5" max="3.0" step="0.005" value="1.680" oninput="syncCalib('colGap',this,3,'c_v_colGap')"><span class="cval" id="c_v_colGap">1.680</span></div>
        <div class="calib-secao">Detecção</div>
        <div class="calib-row"><label>Threshold</label><input type="range" id="c_thresh" min="30" max="250" step="1" value="81" oninput="syncCalib('threshold',this,0,'c_v_thresh')"><span class="cval" id="c_v_thresh">81</span></div>
        <button class="btn-exportar" onclick="copiarConfig()">📋 Copiar valores</button>
    </div>
</div>

<script>
// ═══════════════════════════════════════════
// ELEMENTOS
// ═══════════════════════════════════════════
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d', { willReadFrequently: true });
const statusPill  = document.getElementById('status-pill');
const statusTxt   = document.getElementById('status-txt');
const cardRes     = document.getElementById('card-resultado');
const resNome     = document.getElementById('res-nome');
const resAcertos  = document.getElementById('res-acertos');
const resTotal    = document.getElementById('res-total');
const barraFill   = document.getElementById('barra-fill');
const btnCapturar = document.getElementById('btn-capturar');
const btnProximo  = document.getElementById('btn-proximo');

// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
let congelado      = false;
let dadosAtuais    = null;
let imgCongelada   = null;   // ImageData do frame capturado (imagem retificada)
let qrCongelado    = null;   // QR na imagem retificada
let historico      = [];
let torchLigada    = false;
let videoTrack     = null;

// Suavização QR
const SMOOTH_N = 6;
let qrBuffer   = [];

// Estabilidade da folha
let folhaBuffer     = [];
const FOLHA_N       = 5;
let framesComFolha  = 0;
let framesSemFolha  = 0;
const DEBOUNCE_OFF  = 10;
const FRAMES_ESTAVEL = 6;   // frames seguidos com folha boa para liberar botão

const config = {
    offsetX: -2.175, offsetY: 1.560,
    gapH: 0.611,     gapV: 0.335,
    colGap: 1.680,   threshold: 81
};

// ═══════════════════════════════════════════
// HOMOGRAFIA — encontra os 4 cantos da folha
// ═══════════════════════════════════════════

/**
 * Detecta o maior quadrilátero branco na imagem.
 * Retorna {tl, tr, br, bl} ou null.
 */
function detectarCantosFolha(data, W, H) {
    // 1. Constrói mapa de "branco" em resolução reduzida (a cada STEP pixels)
    const STEP = 4;
    const w = Math.floor(W / STEP);
    const h = Math.floor(H / STEP);
    const bright = new Uint8Array(w * h);

    for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
            const px = x * STEP, py = y * STEP;
            const i  = (py * W + px) * 4;
            const v  = (data[i] + data[i+1] + data[i+2]) / 3;
            bright[y * w + x] = v > 200 ? 1 : 0;
        }
    }

    // 2. Para cada canto, varre diagonal até encontrar pixel claro
    function scanDiag(x0, y0, dx, dy) {
        const steps = Math.max(w, h);
        for (let s = 0; s < steps; s++) {
            const x = Math.round(x0 + dx * s);
            const y = Math.round(y0 + dy * s);
            if (x < 0 || x >= w || y < 0 || y >= h) break;
            if (bright[y * w + x]) return { x: x * STEP, y: y * STEP };
        }
        return null;
    }

    const D = 0.7071; // 1/sqrt(2)
    const tl = scanDiag(0,   0,    D,  D);
    const tr = scanDiag(w-1, 0,   -D,  D);
    const br = scanDiag(w-1, h-1, -D, -D);
    const bl = scanDiag(0,   h-1,  D, -D);

    if (!tl || !tr || !br || !bl) return null;

    // 3. Valida tamanho mínimo (~35% da tela)
    const largura = Math.hypot(tr.x-tl.x, tr.y-tl.y);
    const altura  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
    if (largura < W * 0.3 || altura < H * 0.3) return null;

    return { tl, tr, br, bl };
}

function suavizarFolha(cantos) {
    folhaBuffer.push(cantos);
    if (folhaBuffer.length > FOLHA_N) folhaBuffer.shift();
    const n = folhaBuffer.length;
    const avg = (k, a) => folhaBuffer.reduce((s, f) => s + f[k][a], 0) / n;
    return {
        tl: { x: avg('tl','x'), y: avg('tl','y') },
        tr: { x: avg('tr','x'), y: avg('tr','y') },
        br: { x: avg('br','x'), y: avg('br','y') },
        bl: { x: avg('bl','x'), y: avg('bl','y') },
    };
}

// ═══════════════════════════════════════════
// HOMOGRAFIA 3×3 (src quadrilátero → dst retângulo)
// ═══════════════════════════════════════════
function calcH(src, dW, dH) {
    const srcPts = [src.tl, src.tr, src.br, src.bl];
    const dstPts = [{x:0,y:0},{x:dW,y:0},{x:dW,y:dH},{x:0,y:dH}];
    const A = [];
    for (let i = 0; i < 4; i++) {
        const {x:xs,y:ys} = srcPts[i], {x:xd,y:yd} = dstPts[i];
        A.push([-xs,-ys,-1, 0,  0,  0, xd*xs, xd*ys, xd]);
        A.push([ 0,  0,  0,-xs,-ys,-1, yd*xs, yd*ys, yd]);
    }
    const h = gaussElim(A);
    if (!h) return null;
    return [...h, 1];
}

function gaussElim(A) {
    const n = 8;
    const M = A.map(r => [...r]);
    for (let c = 0; c < n; c++) {
        let mx = c;
        for (let r = c+1; r < 2*n; r++) if (Math.abs(M[r][c]) > Math.abs(M[mx][c])) mx = r;
        [M[c], M[mx]] = [M[mx], M[c]];
        if (Math.abs(M[c][c]) < 1e-10) return null;
        for (let r = 0; r < 2*n; r++) {
            if (r === c) continue;
            const f = M[r][c] / M[c][c];
            for (let k = c; k <= n; k++) M[r][k] -= f * M[c][k];
        }
    }
    return M.slice(0,n).map((r,i) => r[n]/r[i]);
}

function invH(m) {
    const [a,b,c,d,e,f,g,h,ii] = m;
    const det = a*(e*ii-f*h) - b*(d*ii-f*g) + c*(d*h-e*g);
    if (Math.abs(det) < 1e-10) return null;
    return [
        (e*ii-f*h)/det, (c*h-b*ii)/det, (b*f-c*e)/det,
        (f*g-d*ii)/det, (a*ii-c*g)/det, (c*d-a*f)/det,
        (d*h-e*g)/det,  (b*g-a*h)/det,  (a*e-b*d)/det
    ];
}

// Aplica homografia: retifica src → retângulo dW×dH
function retificar(srcData, srcW, srcH, H, dW, dH) {
    const Hi = invH(H);
    if (!Hi) return null;
    const dst   = new ImageData(dW, dH);
    const dstD  = dst.data;
    const srcD  = srcData.data;
    for (let dy = 0; dy < dH; dy++) {
        for (let dx = 0; dx < dW; dx++) {
            const w  = Hi[6]*dx + Hi[7]*dy + Hi[8];
            const sx = (Hi[0]*dx + Hi[1]*dy + Hi[2]) / w;
            const sy = (Hi[3]*dx + Hi[4]*dy + Hi[5]) / w;
            const sx0 = Math.floor(sx), sy0 = Math.floor(sy);
            if (sx0 < 0 || sx0 >= srcW-1 || sy0 < 0 || sy0 >= srcH-1) continue;
            const fx = sx-sx0, fy = sy-sy0;
            const i00=(sy0*srcW+sx0)*4, i10=i00+4, i01=((sy0+1)*srcW+sx0)*4, i11=i01+4;
            const id = (dy*dW+dx)*4;
            for (let c=0;c<3;c++)
                dstD[id+c] = (srcD[i00+c]*(1-fx)*(1-fy) + srcD[i10+c]*fx*(1-fy) +
                               srcD[i01+c]*(1-fx)*fy    + srcD[i11+c]*fx*fy) | 0;
            dstD[id+3] = 255;
        }
    }
    return dst;
}

// ═══════════════════════════════════════════
// SUAVIZAÇÃO QR
// ═══════════════════════════════════════════
function smoothQR(code) {
    qrBuffer.push({
        tl:{...code.location.topLeftCorner},
        tr:{...code.location.topRightCorner},
        bl:{...code.location.bottomLeftCorner},
        br:{...code.location.bottomRightCorner},
    });
    if (qrBuffer.length > SMOOTH_N) qrBuffer.shift();
    const n = qrBuffer.length;
    const avg = (k,a) => qrBuffer.reduce((s,q)=>s+q[k][a],0)/n;
    return { location:{
        topLeftCorner:    {x:avg('tl','x'),y:avg('tl','y')},
        topRightCorner:   {x:avg('tr','x'),y:avg('tr','y')},
        bottomLeftCorner: {x:avg('bl','x'),y:avg('bl','y')},
        bottomRightCorner:{x:avg('br','x'),y:avg('br','y')},
    }, data: code.data };
}

// ═══════════════════════════════════════════
// DESENHO
// ═══════════════════════════════════════════
function desenharContornoFolha(c, estavel) {
    const cor  = estavel ? '#00ff9d' : '#00e5ff';
    const alfa = estavel ? '0.9'     : '0.6';
    ctx.strokeStyle = `rgba(${estavel?'0,255,157':'0,229,255'},${alfa})`;
    ctx.lineWidth = estavel ? 3 : 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(c.tl.x, c.tl.y);
    ctx.lineTo(c.tr.x, c.tr.y);
    ctx.lineTo(c.br.x, c.br.y);
    ctx.lineTo(c.bl.x, c.bl.y);
    ctx.closePath();
    ctx.stroke();
    ctx.fillStyle = estavel ? 'rgba(0,255,157,0.07)' : 'rgba(0,229,255,0.04)';
    ctx.fill();
    // Cantos
    [c.tl,c.tr,c.br,c.bl].forEach(p => {
        ctx.beginPath(); ctx.arc(p.x,p.y,6,0,Math.PI*2);
        ctx.fillStyle = cor; ctx.fill();
    });
}

function desenharContornoQR(qr) {
    const {topLeftCorner:tl,topRightCorner:tr,bottomRightCorner:br,bottomLeftCorner:bl} = qr.location;
    ctx.strokeStyle = 'rgba(255,214,0,0.9)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y);
    ctx.closePath(); ctx.stroke();
}

// ═══════════════════════════════════════════
// FLASH
// ═══════════════════════════════════════════
async function toggleFlash() {
    if (!videoTrack) return;
    try {
        torchLigada = !torchLigada;
        await videoTrack.applyConstraints({ advanced: [{ torch: torchLigada }] });
        document.getElementById('btn-flash').innerText = torchLigada ? '🔦' : '💡';
        document.getElementById('btn-flash').classList.toggle('active', torchLigada);
    } catch(e) {
        showToast('Flash não disponível neste dispositivo');
        torchLigada = false;
    }
}

// ═══════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════
function setStatus(estado, texto) {
    statusPill.className = 'status-pill ' + estado;
    statusTxt.innerText = texto;
}
function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
}

// ═══════════════════════════════════════════
// CÂMERA
// ═══════════════════════════════════════════
async function iniciarCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
        });
        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];
        video.onloadedmetadata = () => { video.play(); requestAnimationFrame(tick); };
    } catch(err) {
        setStatus('', 'ERRO: ' + err.name);
        alert('Erro câmera: ' + err.message);
    }
}
iniciarCamera();

// ═══════════════════════════════════════════
// LOOP PRINCIPAL
// ═══════════════════════════════════════════
let ultimoTick = 0;
let folhaAtual = null;

function tick(ts) {
    if (congelado) return;
    requestAnimationFrame(tick);
    if (video.readyState < 2) return;

    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width  = video.videoWidth  || 640;
        canvas.height = video.videoHeight || 480;
    }

    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    // Processa a ~10fps
    if (ts - ultimoTick < 100) return;
    ultimoTick = ts;

    const W = canvas.width, H = canvas.height;
    const imgData = ctx.getImageData(0, 0, W, H);

    // 1. Detecta bordas da folha
    const cantos = detectarCantosFolha(imgData.data, W, H);

    if (cantos) {
        framesSemFolha = 0;
        framesComFolha = Math.min(framesComFolha + 1, FRAMES_ESTAVEL + 5);
        folhaAtual = suavizarFolha(cantos);
        const estavel = framesComFolha >= FRAMES_ESTAVEL;
        desenharContornoFolha(folhaAtual, estavel);

        // 2. Detecta QR no frame original
        const code = jsQR(imgData.data, W, H);
        if (code && code.data.includes('|GB:')) {
            const match = code.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
            if (match) {
                desenharContornoQR(smoothQR(code));
                dadosAtuais = { gabarito: match[2], nome: match[1] };
                btnCapturar.disabled = !estavel;
                setStatus(estavel ? 'pronto' : 'scanning',
                    estavel ? '✅ PRONTO — CAPTURE!' : 'QR OK • Centralize a folha...');
                return;
            }
        }

        setStatus('scanning', estavel ? 'Folha OK • Procurando QR...' : 'Centralizando folha...');
        btnCapturar.disabled = true;
        dadosAtuais = null;

    } else {
        framesSemFolha++;
        framesComFolha = 0;
        if (framesSemFolha >= DEBOUNCE_OFF) {
            folhaAtual = null;
            folhaBuffer = [];
            dadosAtuais = null;
            btnCapturar.disabled = true;
            setStatus('scanning', 'APONTE PARA A FOLHA');
        }
    }
}

// ═══════════════════════════════════════════
// CAPTURAR — aplica homografia e lê o QR na imagem retificada
// ═══════════════════════════════════════════
function capturar() {
    if (!dadosAtuais || !folhaAtual) return;
    congelado = true;
    btnCapturar.style.display = 'none';
    btnProximo.style.display  = 'block';
    setStatus('frozen', 'PROCESSANDO...');

    const W = canvas.width, H = canvas.height;
    const frameAtual = ctx.getImageData(0, 0, W, H);

    // Tamanho A4 proporcional
    const A4W = 794, A4H = 1123;
    const Hmat = calcH(folhaAtual, A4W, A4H);

    if (Hmat) {
        const ret = retificar(frameAtual, W, H, Hmat, A4W, A4H);
        if (ret) {
            canvas.width  = A4W;
            canvas.height = A4H;
            ctx.putImageData(ret, 0, 0);

            // Relê QR na imagem retificada
            const qrRet = jsQR(ret.data, A4W, A4H);
            if (qrRet && qrRet.data.includes('|GB:')) {
                const match = qrRet.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
                if (match) {
                    imgCongelada = ret;
                    qrCongelado  = smoothQR(qrRet);
                    processar(qrCongelado, match[2], match[1], ret);
                    setStatus('frozen', 'CONGELADO');
                    return;
                }
            }

            // QR não encontrado na retificada — usa dados do live
            imgCongelada = ret;
            // Tenta reler QR com o qrBuffer atual
            if (qrBuffer.length > 0) {
                const qrS = smoothQR({data: dadosAtuais.gabarito, location: qrBuffer[qrBuffer.length-1]});
                processar(qrS, dadosAtuais.gabarito, dadosAtuais.nome, ret);
            }
            setStatus('frozen', 'CONGELADO (sem QR retif.)');
            return;
        }
    }

    // Fallback — sem homografia
    imgCongelada = frameAtual;
    ctx.putImageData(frameAtual, 0, 0);
    const qrFb = jsQR(frameAtual.data, W, H);
    if (qrFb) {
        const match = qrFb.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
        if (match) {
            qrCongelado = smoothQR(qrFb);
            processar(qrCongelado, match[2], match[1], frameAtual);
        }
    }
    setStatus('frozen', 'CONGELADO');
}

// ═══════════════════════════════════════════
// PROCESSAR bolinhas
// ═══════════════════════════════════════════
function processar(qr, gabarito, nome, pixelData) {
    const tl = qr.location.topLeftCorner,    tr = qr.location.topRightCorner;
    const bl = qr.location.bottomLeftCorner, br = qr.location.bottomRightCorner;
    const qrW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
    const qrH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
    const size = (qrW + qrH) / 2;
    const cx   = (tl.x + br.x) / 2, cy = (tl.y + br.y) / 2;
    const ux = (tr.x-tl.x)/qrW, uy = (tr.y-tl.y)/qrW;
    const vx = (bl.x-tl.x)/qrH, vy = (bl.y-tl.y)/qrH;

    const d = pixelData.data, W = pixelData.width, H = pixelData.height;
    let acertos = 0;

    // Desenha contorno QR na captura
    desenharContornoQR(qr);

    for (let i = 0; i < gabarito.length; i++) {
        const col = Math.floor(i/30), lin = i%30;
        const bx  = config.offsetX + col*config.colGap;
        const by  = config.offsetY + lin*config.gapV;
        let marcada = -1, maxEsc = 0;

        for (let alt = 0; alt < 5; alt++) {
            const nx = bx + alt*config.gapH, ny = by;
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x<1||x>W-2||y<1||y>H-2) continue;

            let esc = 0;
            for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) {
                const px=Math.floor(x+dx), py=Math.floor(y+dy);
                const idx=(py*W+px)*4;
                esc += 255 - ((d[idx]+d[idx+1]+d[idx+2])/3);
            }
            esc /= 9;

            const marcadaEsta = esc > config.threshold;
            const correta     = String.fromCharCode(65+alt) === gabarito[i];

            ctx.beginPath(); ctx.arc(x,y,8,0,Math.PI*2);
            ctx.fillStyle = marcadaEsta ? (correta?'rgba(0,255,157,.9)':'rgba(255,61,90,.9)') : 'rgba(255,255,255,.18)';
            ctx.fill();
            ctx.fillStyle = marcadaEsta ? '#080c10' : 'rgba(255,255,255,.55)';
            ctx.font = 'bold 7px monospace';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(String.fromCharCode(65+alt), x, y);

            if (marcadaEsta && esc > maxEsc) { maxEsc=esc; marcada=alt; }
        }
        if (marcada!==-1 && String.fromCharCode(65+marcada)===gabarito[i]) acertos++;
    }

    const total = gabarito.length, pct = Math.round((acertos/total)*100);
    resNome.innerText     = nome;
    resAcertos.innerText  = acertos;
    resTotal.innerText    = `/ ${total}`;
    barraFill.style.width = pct+'%';
    cardRes.classList.add('visivel');
    const idx = historico.findIndex(h=>h.nome===nome);
    const ent = {nome,acertos,total,pct};
    if (idx>=0) historico[idx]=ent; else historico.push(ent);
    atualizarBadge();
}

// ═══════════════════════════════════════════
// PRÓXIMO
// ═══════════════════════════════════════════
function proximo() {
    congelado=false; dadosAtuais=null; imgCongelada=null; qrCongelado=null;
    qrBuffer=[]; folhaBuffer=[]; folhaAtual=null;
    framesComFolha=0; framesSemFolha=0;
    btnCapturar.style.display='block'; btnCapturar.disabled=true;
    btnProximo.style.display='none';
    cardRes.classList.remove('visivel');
    setStatus('scanning','APONTE PARA A FOLHA');
    requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════
// CALIBRAÇÃO
// ═══════════════════════════════════════════
function syncCalib(key,input,dec,spanId) {
    config[key] = parseFloat(input.value);
    document.getElementById(spanId).innerText = config[key].toFixed(dec);
    if (congelado && imgCongelada && qrCongelado) {
        ctx.putImageData(imgCongelada,0,0);
        processar(qrCongelado, dadosAtuais.gabarito, dadosAtuais.nome, imgCongelada);
    }
}
function abrirCalib()  { document.getElementById('drawer-calib').classList.add('aberto'); }
function fecharCalib() { document.getElementById('drawer-calib').classList.remove('aberto'); }
function copiarConfig() {
    const t=`offsetX:${config.offsetX.toFixed(3)}, offsetY:${config.offsetY.toFixed(3)}, gapH:${config.gapH.toFixed(3)}, gapV:${config.gapV.toFixed(3)}, colGap:${config.colGap.toFixed(3)}, threshold:${config.threshold}`;
    navigator.clipboard.writeText(t).catch(()=>{});
    showToast('Copiado!');
}

// ═══════════════════════════════════════════
// HISTÓRICO / CSV
// ═══════════════════════════════════════════
function atualizarBadge() {
    document.getElementById('hist-badge').innerText = historico.length;
    document.getElementById('hist-count-label').innerText = historico.length;
}
function abrirDrawer() {
    const lista=document.getElementById('drawer-lista'), resumo=document.getElementById('drawer-resumo');
    if (!historico.length) { lista.innerHTML='<div class="drawer-vazio">Nenhuma prova ainda.</div>'; resumo.innerText=''; }
    else {
        const media=Math.round(historico.reduce((s,h)=>s+h.pct,0)/historico.length);
        resumo.innerText=`média ${media}%`;
        lista.innerHTML=historico.slice().sort((a,b)=>b.acertos-a.acertos).map(h=>`
            <div class="historico-item">
                <div><div class="hist-nome">${h.nome}</div><div class="hist-pct">${h.pct}%</div></div>
                <div class="hist-nota">${h.acertos}<span style="color:var(--muted);font-size:12px">/${h.total}</span></div>
            </div>`).join('');
    }
    document.getElementById('drawer').classList.add('aberto');
}
function fecharDrawer() { document.getElementById('drawer').classList.remove('aberto'); }
function exportarCSV() {
    if (!historico.length) { showToast('Nenhum resultado ainda'); return; }
    const l=['Nome,Acertos,Total,Porcentagem'];
    historico.forEach(h=>l.push(`"${h.nome}",${h.acertos},${h.total},${h.pct}%`));
    const b=new Blob([l.join('\n')],{type:'text/csv;charset=utf-8;'});
    const u=URL.createObjectURL(b), a=document.createElement('a');
    a.href=u; a.download='resultados_omr.csv'; a.click(); URL.revokeObjectURL(u);
    showToast('CSV exportado!');
}
