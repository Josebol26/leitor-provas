<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scanner OMR Ajuste Fino</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; overflow: hidden; background: #000; }
        #video { width: 100vw; height: 100vh; object-fit: contain; }
        #canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: contain; }
        
        .painel { position: fixed; bottom: 10px; left: 50%; transform: translateX(-50%); 
                  background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; width: 85%; 
                  border: 2px solid #28a745; color: white; text-align: center; }
        
        #res-nota { font-size: 32px; color: #28a745; font-weight: bold; margin: 5px 0; }
        #res-nome { font-size: 18px; color: #fff; font-weight: bold; margin-bottom: 5px; }
        #status { font-weight: bold; font-size: 14px; margin-bottom: 5px; }
        
        .control-group { margin-bottom: 10px; font-size: 12px; }
        input[type=range] { width: 100%; }
        
        button { padding: 12px; border: none; border-radius: 8px; color: white; width: 100%; font-weight: bold; font-size: 16px; background: #007bff; }
        #btn-confirmar { background: #28a745; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div class="painel">
        <div id="status">MIRAR NO QR CODE</div>
        <div id="res-nome"></div>
        <div id="res-nota">-- / --</div>
        
        <div class="control-group">
            <label>Limiar de Escuridão (Threshold): <span id="vthresh">160</span></label>
            <input type="range" id="threshold" min="50" max="250" step="1" value="160">
        </div>
        
        <button id="btn-capturar" onclick="capturar()">CAPTURAR</button>
        <button id="btn-confirmar" onclick="proximo()">PRÓXIMO</button>
    </div>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    const resNomeDiv = document.getElementById('res-nome');
    const resNotaDiv = document.getElementById('res-nota');
    const btnCapturar = document.getElementById('btn-capturar');
    const btnConfirmar = document.getElementById('btn-confirmar');
    const thresholdSlider = document.getElementById('threshold');
    const vthreshSpan = document.getElementById('vthresh');
    
    let congelado = false;
    let dadosAtuais = null;
    let imagemCongelada = null; // FIX 3: armazena ImageData no momento da captura
    let thresholdValue = 160;

    thresholdSlider.addEventListener('input', () => {
        thresholdValue = parseInt(thresholdSlider.value);
        vthreshSpan.innerText = thresholdValue;

        // FIX 5: redesenha sobre a imagem congelada ao mover slider
        if (congelado && dadosAtuais && imagemCongelada) {
            ctx.putImageData(imagemCongelada, 0, 0);
            processar(dadosAtuais.code, dadosAtuais.gabarito, dadosAtuais.nome, true, imagemCongelada);
        }
    });

    const config = {
        offsetX: -1.980, 
        offsetY: 0.960,
        gapH: 0.492,
        gapV: 0.287,
        colGap: 1.300
    };

    async function iniciarCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" } 
            });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
        } catch (err) {
            alert("Erro de câmera: " + err);
        }
    }

    iniciarCamera();

    function tick() {
        if (congelado) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imgData.data, imgData.width, imgData.height);

            if (code) {
                const raw = code.data;
                // FIX 4: regex corrigida para não engolir o separador
                const matchData = raw.match(/AL:([^|]*)\|GB:([A-E]+)/);
                
                if (matchData) {
                    // FIX 2: passa imgData já capturado, evitando getImageData no loop
                    processar(code, matchData[2], matchData[1], false, imgData);
                    dadosAtuais = { code, gabarito: matchData[2], nome: matchData[1] };
                    statusDiv.innerText = "PRONTO";
                }
            } else {
                statusDiv.innerText = "MIRAR NO QR CODE";
            }
        }
        requestAnimationFrame(tick);
    }

    function capturar() {
        if (!dadosAtuais) return;
        congelado = true;
        btnCapturar.style.display = "none";
        btnConfirmar.style.display = "block";
        statusDiv.innerText = "CAPTURA CONGELADA";

        // FIX 3: salva o ImageData atual antes de desenhar os pontos
        imagemCongelada = ctx.getImageData(0, 0, canvas.width, canvas.height);
        processar(dadosAtuais.code, dadosAtuais.gabarito, dadosAtuais.nome, true, imagemCongelada);
    }

    function proximo() {
        congelado = false;
        dadosAtuais = null;
        imagemCongelada = null;
        btnCapturar.style.display = "block";
        btnConfirmar.style.display = "none";
        resNomeDiv.innerText = "";
        resNotaDiv.innerText = "-- / --";
        requestAnimationFrame(tick);
    }

    // FIX 2: recebe pixelData como parâmetro — sem getImageData dentro do loop
    function processar(qr, gabarito, nome, finalizar, pixelData) {
        const qrWidth = Math.sqrt(
            Math.pow(qr.location.topRightCorner.x - qr.location.topLeftCorner.x, 2) +
            Math.pow(qr.location.topRightCorner.y - qr.location.topLeftCorner.y, 2)
        );
        const qrHeight = Math.sqrt(
            Math.pow(qr.location.bottomLeftCorner.x - qr.location.topLeftCorner.x, 2) +
            Math.pow(qr.location.bottomLeftCorner.y - qr.location.topLeftCorner.y, 2)
        );
        const qrSize = (qrWidth + qrHeight) / 2;
        
        const qrCenterX = (qr.location.topLeftCorner.x + qr.location.bottomRightCorner.x) / 2;
        const qrCenterY = (qr.location.topLeftCorner.y + qr.location.bottomRightCorner.y) / 2;

        const data = pixelData.data;
        const imgWidth = pixelData.width;

        let acertos = 0;

        for (let i = 0; i < gabarito.length; i++) {
            const col = Math.floor(i / 30);
            const lin = i % 30;

            const posX = config.offsetX + (col * config.colGap);
            const posY = config.offsetY + (lin * config.gapV);

            let marcada = -1;
            let maxEsc = 0;

            for (let alt = 0; alt < 5; alt++) {
                const x = qrCenterX + qrSize * (posX + (alt * config.gapH));
                const y = qrCenterY + qrSize * posY;

                if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) continue;

                // FIX 2: leitura direta do buffer, sem chamar getImageData por pixel
                let totalEsc = 0;
                let pixels = 0;
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const px = Math.min(Math.max(Math.floor(x + dx), 0), imgWidth - 1);
                        const py = Math.min(Math.max(Math.floor(y + dy), 0), pixelData.height - 1);
                        const idx = (py * imgWidth + px) * 4;
                        totalEsc += 255 - ((data[idx] + data[idx + 1] + data[idx + 2]) / 3);
                        pixels++;
                    }
                }
                const esc = totalEsc / pixels;

                ctx.fillStyle = esc > thresholdValue ? "red" : "cyan";
                ctx.beginPath();
                // FIX 1: ângulo final corrigido para Math.PI * 2 (círculo completo)
                ctx.arc(x, y, 7, 0, Math.PI * 2);
                ctx.fill();

                if (esc > thresholdValue && esc > maxEsc) {
                    maxEsc = esc;
                    marcada = alt;
                }
            }
            if (marcada !== -1 && String.fromCharCode(65 + marcada) === gabarito[i]) acertos++;
        }
        
        if (finalizar) {
            resNomeDiv.innerText = nome;
            resNotaDiv.innerText = `${acertos} / ${gabarito.length}`;
        }
    }
</script>
</body>
</html>
