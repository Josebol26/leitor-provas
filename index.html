<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#080c10; --surface:#0e1419; --border:#1e2a35;
            --accent:#00e5ff; --accent2:#00ff9d; --danger:#ff3d5a;
            --text:#e8f0f5; --muted:#4a6070; --card:#111922;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:'Syne',sans-serif; background:#000; color:var(--text); overflow:hidden; height:100vh; width:100vw; }

        #video  { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:0; }
        #canvas { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; filter:brightness(1.2) contrast(1.05); }

        .overlay-bottom { position:fixed; bottom:0; left:0; right:0; height:45%; background:linear-gradient(to top,rgba(8,12,16,.93) 30%,transparent); z-index:2; pointer-events:none; }

        .header { position:fixed; top:0; left:0; right:0; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:16px 20px 12px; background:linear-gradient(to bottom,rgba(8,12,16,.95),transparent); }
        .logo { font-family:'Space Mono',monospace; font-size:13px; letter-spacing:.15em; color:var(--accent); }
        .logo span { color:var(--muted); }
        .icon-btn { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:7px 10px; font-size:16px; cursor:pointer; color:white; line-height:1; transition:all .2s; }
        .icon-btn.active { border-color:#ffd600; background:rgba(255,214,0,.15); }

        .mira { position:fixed; top:50%; left:50%; transform:translate(-50%,-65%); width:180px; height:180px; z-index:3; pointer-events:none; transition:opacity .4s; }
        .mira.oculta { opacity:0; }
        .mc { position:absolute; width:24px; height:24px; border-color:var(--accent); border-style:solid; opacity:.8; }
        .mc.tl{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
        .mc.tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
        .mc.bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
        .mc.br{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
        .mira-scan { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--accent),transparent); animation:scan 2s ease-in-out infinite; }
        @keyframes scan{0%{top:0;opacity:1}90%{top:100%;opacity:1}100%{top:100%;opacity:0}}

        .status-pill { display:inline-flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--border); border-radius:100px; padding:7px 14px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; margin-bottom:14px; transition:all .3s; }
        .status-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:all .3s; }
        .status-pill.scanning .status-dot { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:pulse 1.2s infinite; }
        .status-pill.pronto   .status-dot { background:var(--accent2); box-shadow:0 0 8px var(--accent2); }
        .status-pill.frozen   .status-dot { background:#ffd600; box-shadow:0 0 8px #ffd600; }
        @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.8)}}

        .card-resultado { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:18px; margin-bottom:12px; display:none; animation:slideUp .35s cubic-bezier(.16,1,.3,1); }
        .card-resultado.visivel { display:block; }
        @keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .nome-aluno { font-size:12px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
        .nota-wrap { display:flex; align-items:baseline; gap:6px; }
        .nota-num { font-family:'Space Mono',monospace; font-size:50px; font-weight:700; line-height:1; color:var(--accent2); letter-spacing:-2px; }
        .nota-den { font-family:'Space Mono',monospace; font-size:20px; color:var(--muted); }
        .barra-progresso { margin-top:12px; height:4px; background:var(--border); border-radius:99px; overflow:hidden; }
        .barra-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .6s cubic-bezier(.16,1,.3,1); }

        .painel { position:fixed; bottom:0; left:0; right:0; z-index:10; padding:0 16px 24px; }
        .btn-row { display:flex; gap:10px; }
        .btn { flex:1; height:52px; border:none; border-radius:14px; font-family:'Syne',sans-serif; font-weight:700; font-size:14px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn:active { transform:scale(.97); }
        .btn-capturar { background:var(--accent); color:var(--bg); }
        .btn-capturar:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
        .btn-proximo { background:var(--accent2); color:var(--bg); display:none; }

        .historico-btn { position:fixed; top:16px; right:20px; z-index:11; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 12px; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:6px; transition:all .2s; }
        .historico-btn:hover { border-color:var(--accent); color:var(--accent); }
        .historico-count { background:var(--accent); color:var(--bg); border-radius:4px; padding:1px 6px; font-weight:700; font-size:10px; }
        .btn-calib-abrir { position:fixed; bottom:105px; right:16px; z-index:11; background:var(--card); border:1px solid var(--border); border-radius:10px; padding:8px 10px; font-size:18px; cursor:pointer; transition:all .2s; line-height:1; }

        .toast { position:fixed; top:70px; left:50%; transform:translateX(-50%) translateY(-10px); background:var(--accent2); color:var(--bg); padding:10px 20px; border-radius:100px; font-weight:700; font-size:13px; z-index:20; opacity:0; transition:all .3s; pointer-events:none; white-space:nowrap; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

        .drawer { position:fixed; inset:0; z-index:30; display:none; }
        .drawer.aberto { display:block; }
        .drawer-bg { position:absolute; inset:0; background:rgba(8,12,16,.8); backdrop-filter:blur(4px); }
        .drawer-panel { position:absolute; bottom:0; left:0; right:0; background:var(--surface); border-top:1px solid var(--border); border-radius:24px 24px 0 0; padding:20px 20px 40px; max-height:75vh; overflow-y:auto; animation:slideUp .3s cubic-bezier(.16,1,.3,1); }
        .drawer-handle { width:40px; height:4px; background:var(--border); border-radius:99px; margin:0 auto 20px; }
        .drawer-titulo { font-size:18px; font-weight:800; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
        .drawer-titulo span { color:var(--muted); font-size:13px; font-weight:400; }
        .historico-item { display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--border); }
        .historico-item:last-child { border-bottom:none; }
        .hist-nome { font-size:14px; font-weight:600; }
        .hist-nota { font-family:'Space Mono',monospace; font-size:16px; color:var(--accent2); }
        .hist-pct { font-size:11px; color:var(--muted); margin-top:2px; }
        .drawer-vazio { text-align:center; padding:40px 0; color:var(--muted); font-size:14px; }
        .btn-exportar { width:100%; margin-top:16px; height:46px; background:transparent; border:1px solid var(--border); border-radius:12px; color:var(--text); font-family:'Syne',sans-serif; font-weight:600; font-size:13px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-exportar:hover { border-color:var(--accent2); color:var(--accent2); }

        .calib-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
        .calib-row label { width:75px; text-align:right; flex-shrink:0; color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; }
        .calib-row input[type=range] { flex:1; accent-color:var(--accent); }
        .calib-row .cval { width:52px; font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); flex-shrink:0; }
        .calib-secao { font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:.1em; border-bottom:1px solid var(--border); margin:12px 0 8px; padding-bottom:4px; }
    </style>
</head>
<body>

<video id="video" playsinline autoplay muted></video>
<canvas id="canvas"></canvas>
<div class="overlay-bottom"></div>

<div class="header">
    <div class="logo">OMR<span>/</span>SCAN</div>
    <div style="display:flex;gap:8px">
        <button class="icon-btn" id="btn-flash" onclick="toggleFlash()">💡</button>
        <button class="historico-btn" onclick="abrirDrawer()">
            📋 <span id="hist-count-label">0</span>
            <span class="historico-count" id="hist-badge">0</span>
        </button>
    </div>
</div>

<div class="mira" id="mira">
    <div class="mc tl"></div><div class="mc tr"></div>
    <div class="mc bl"></div><div class="mc br"></div>
    <div class="mira-scan"></div>
</div>

<div class="toast" id="toast"></div>

<div class="painel">
    <div class="status-pill scanning" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-txt">AGUARDANDO QR CODE</span>
    </div>
    <div class="card-resultado" id="card-resultado">
        <div class="nome-aluno" id="res-nome">—</div>
        <div class="nota-wrap">
            <div class="nota-num" id="res-acertos">—</div>
            <div class="nota-den" id="res-total">/ —</div>
        </div>
        <div class="barra-progresso"><div class="barra-fill" id="barra-fill" style="width:0%"></div></div>
    </div>
    <div class="btn-row">
        <button class="btn btn-capturar" id="btn-capturar" onclick="capturar()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M3 9a2 2 0 0 1 2-2h1l2-2h8l2 2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            CAPTURAR
        </button>
        <button class="btn btn-proximo" id="btn-proximo" onclick="proximo()">
            PRÓXIMO
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>
</div>

<button class="btn-calib-abrir" onclick="abrirCalib()">⚙️</button>

<!-- Drawer Histórico -->
<div class="drawer" id="drawer">
    <div class="drawer-bg" onclick="fecharDrawer()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">Resultados <span id="drawer-resumo"></span></div>
        <div id="drawer-lista"><div class="drawer-vazio">Nenhuma prova ainda.</div></div>
        <button class="btn-exportar" onclick="exportarCSV()">⬇️ Exportar CSV</button>
    </div>
</div>

<!-- Drawer Calibração -->
<div class="drawer" id="drawer-calib">
    <div class="drawer-bg" onclick="fecharCalib()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">Calibração</div>
        <div class="calib-secao">Posição Y</div>
        <div class="calib-row"><label>Offset Y</label><input type="range" id="c_oY" min="-1" max="3" step="0.005" value="0.733" oninput="syncCalib('offsetY',this,3,'v_oY')"><span class="cval" id="v_oY">0.733</span></div>
        <div class="calib-row"><label>Gap V</label><input type="range" id="c_gV" min="0.1" max="0.5" step="0.001" value="0.222" oninput="syncCalib('gapV',this,3,'v_gV')"><span class="cval" id="v_gV">0.222</span></div>
        <div class="calib-secao">Detecção</div>
        <div class="calib-row"><label>Threshold</label><input type="range" id="c_th" min="2" max="80" step="1" value="15" oninput="syncCalib('threshold',this,0,'v_th')"><span class="cval" id="v_th">15</span></div>
        <button class="btn-exportar" onclick="copiarConfig()">📋 Copiar valores</button>
    </div>
</div>

<script>
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d', { willReadFrequently:true });
const mira        = document.getElementById('mira');
const statusPill  = document.getElementById('status-pill');
const statusTxt   = document.getElementById('status-txt');
const cardRes     = document.getElementById('card-resultado');
const resNome     = document.getElementById('res-nome');
const resAcertos  = document.getElementById('res-acertos');
const resTotal    = document.getElementById('res-total');
const barraFill   = document.getElementById('barra-fill');
const btnCapturar = document.getElementById('btn-capturar');
const btnProximo  = document.getElementById('btn-proximo');

let congelado = false, dadosAtuais = null, imgCongelada = null;
let historico = [], torchLigada = false, videoTrack = null;

// Suavização QR
const SMOOTH_N = 6;
let qrBuffer = [], framesSerQR = 0;
const DEBOUNCE = 8;

// ── CALIBRAÇÃO ──
// Posições absolutas de cada coluna (A B C D E) normalizadas pelo tamanho do QR
// Calculadas a partir de foto real — independente da distância/zoom
const cfg = {
    colsX:     [-1.293, -1.127, -0.785, -0.438, -0.139],
    offsetY:    0.733,
    gapV:       0.222,
    threshold:  15    // contraste local (bolinha marcada vs fundo ao redor)
};

function smoothQR(code) {
    qrBuffer.push({
        tl:{...code.location.topLeftCorner},
        tr:{...code.location.topRightCorner},
        bl:{...code.location.bottomLeftCorner},
        br:{...code.location.bottomRightCorner},
    });
    if (qrBuffer.length > SMOOTH_N) qrBuffer.shift();
    const n = qrBuffer.length;
    const avg = (k,a) => qrBuffer.reduce((s,q)=>s+q[k][a],0)/n;
    return { location:{
        topLeftCorner:    {x:avg('tl','x'),y:avg('tl','y')},
        topRightCorner:   {x:avg('tr','x'),y:avg('tr','y')},
        bottomLeftCorner: {x:avg('bl','x'),y:avg('bl','y')},
        bottomRightCorner:{x:avg('br','x'),y:avg('br','y')},
    }, data: code.data };
}

function setStatus(e,t) { statusPill.className='status-pill '+e; statusTxt.innerText=t; }
function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

async function toggleFlash() {
    if (!videoTrack) return;
    try {
        torchLigada = !torchLigada;
        await videoTrack.applyConstraints({ advanced:[{ torch:torchLigada }] });
        document.getElementById('btn-flash').innerText = torchLigada ? '🔦' : '💡';
        document.getElementById('btn-flash').classList.toggle('active', torchLigada);
    } catch(e) { showToast('Flash não disponível'); torchLigada=false; }
}

async function iniciarCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode:{ideal:'environment'}, width:{ideal:1280}, height:{ideal:720} }
        });
        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];
        video.onloadedmetadata = () => { video.play(); requestAnimationFrame(tick); };
    } catch(err) { setStatus('','ERRO: '+err.name); alert('Erro câmera: '+err.message); }
}
iniciarCamera();

let ultimoTick = 0;
function tick(ts) {
    if (congelado) return;
    requestAnimationFrame(tick);
    if (video.readyState < 2) return;
    if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
    }
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    if (ts - ultimoTick < 100) return;
    ultimoTick = ts;

    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imgData.data, canvas.width, canvas.height);

    if (code && code.data.includes('|GB:')) {
        framesSerQR = 0;
        const match = code.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
        if (match) {
            const qrS = smoothQR(code);
            desenharQR(qrS);
            dadosAtuais = { code:qrS, gabarito:match[2], nome:match[1] };
            setStatus('pronto','✅ QR DETECTADO — CAPTURE!');
            mira.classList.add('oculta');
            btnCapturar.disabled = false;
        }
    } else {
        framesSerQR++;
        if (framesSerQR >= DEBOUNCE && dadosAtuais) {
            dadosAtuais = null; qrBuffer = [];
            btnCapturar.disabled = true;
            setStatus('scanning','AGUARDANDO QR CODE');
            mira.classList.remove('oculta');
            cardRes.classList.remove('visivel');
        }
    }
}

function desenharQR(qr) {
    const {topLeftCorner:tl,topRightCorner:tr,bottomRightCorner:br,bottomLeftCorner:bl} = qr.location;
    ctx.strokeStyle='#ffd600'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(tl.x,tl.y); ctx.lineTo(tr.x,tr.y);
    ctx.lineTo(br.x,br.y); ctx.lineTo(bl.x,bl.y); ctx.closePath(); ctx.stroke();
}

function capturar() {
    if (!dadosAtuais) return;
    congelado = true;
    btnCapturar.style.display = 'none';
    btnProximo.style.display  = 'block';
    setStatus('frozen','CONGELADO');
    imgCongelada = ctx.getImageData(0, 0, canvas.width, canvas.height);
    processar(dadosAtuais.code, dadosAtuais.gabarito, dadosAtuais.nome, imgCongelada);
}

function proximo() {
    congelado=false; dadosAtuais=null; imgCongelada=null; qrBuffer=[]; framesSerQR=0;
    btnCapturar.style.display='block'; btnCapturar.disabled=true;
    btnProximo.style.display='none';
    cardRes.classList.remove('visivel');
    mira.classList.remove('oculta');
    setStatus('scanning','AGUARDANDO QR CODE');
    requestAnimationFrame(tick);
}

// ── PROCESSAR com contraste local ──
function processar(qr, gabarito, nome, pixelData) {
    const tl = qr.location.topLeftCorner,    tr = qr.location.topRightCorner;
    const bl = qr.location.bottomLeftCorner, br = qr.location.bottomRightCorner;
    const qrW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
    const qrH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
    const size = (qrW + qrH) / 2;
    const cx   = (tl.x+br.x)/2, cy = (tl.y+br.y)/2;
    const ux = (tr.x-tl.x)/qrW, uy = (tr.y-tl.y)/qrW;
    const vx = (bl.x-tl.x)/qrH, vy = (bl.y-tl.y)/qrH;

    const d = pixelData.data, W = pixelData.width, H = pixelData.height;
    // Raio de amostragem: ~5% do QR para centro, ~15% para anel externo
    const Ri = Math.max(4, Math.round(size * 0.05));   // raio centro
    const Ro = Math.max(12, Math.round(size * 0.15));  // raio externo

    // Desenha QR border
    desenharQR(qr);

    let acertos = 0;

    function sampleBrightness(cx, cy, r) {
        let sum=0, cnt=0;
        for (let dx=-r;dx<=r;dx+=2) for (let dy=-r;dy<=r;dy+=2) {
            if (dx*dx+dy*dy > r*r) continue;
            const px=Math.min(Math.max(Math.floor(cx+dx),0),W-1);
            const py=Math.min(Math.max(Math.floor(cy+dy),0),H-1);
            const idx=(py*W+px)*4;
            sum += (d[idx]+d[idx+1]+d[idx+2])/3;
            cnt++;
        }
        return cnt > 0 ? sum/cnt : 128;
    }

    for (let i = 0; i < gabarito.length; i++) {
        const lin = i % 30;
        const ny  = cfg.offsetY + lin * cfg.gapV;
        let marcada = -1, maxContraste = 0;

        for (let alt = 0; alt < 5; alt++) {
            const nx = cfg.colsX[alt];
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x<0||x>=W||y<0||y>=H) continue;

            // Contraste local: fundo - centro (positivo = centro mais escuro = marcado)
            const inner = sampleBrightness(x, y, Ri);
            const outer = sampleBrightness(x, y, Ro);
            const contraste = outer - inner;

            if (contraste > cfg.threshold && contraste > maxContraste) {
                maxContraste = contraste; marcada = alt;
            }
        }

        const R = Math.max(8, Math.round(size * 0.055));
        for (let alt = 0; alt < 5; alt++) {
            const nx = cfg.colsX[alt];
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x<-100||x>W+100||y<-100||y>H+100) continue;

            const correta = String.fromCharCode(65+alt) === gabarito[i];
            const marcadaEsta = alt === marcada;

            ctx.beginPath(); ctx.arc(x,y,R,0,Math.PI*2);
            ctx.fillStyle = marcadaEsta
                ? (correta ? 'rgba(0,255,157,.88)' : 'rgba(255,61,90,.88)')
                : 'rgba(255,255,255,.2)';
            ctx.fill();
            ctx.strokeStyle = marcadaEsta?(correta?'#00ff9d':'#ff3d5a'):'rgba(255,255,255,.25)';
            ctx.lineWidth=1.5; ctx.stroke();
            ctx.fillStyle = marcadaEsta?'#080c10':'rgba(255,255,255,.55)';
            ctx.font=`bold ${Math.max(8,Math.round(R*.85))}px monospace`;
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(String.fromCharCode(65+alt),x,y);
        }
        if (marcada!==-1 && String.fromCharCode(65+marcada)===gabarito[i]) acertos++;
    }

    const total=gabarito.length, pct=Math.round((acertos/total)*100);
    resNome.innerText=nome; resAcertos.innerText=acertos;
    resTotal.innerText=`/ ${total}`; barraFill.style.width=pct+'%';
    cardRes.classList.add('visivel');
    const idx=historico.findIndex(h=>h.nome===nome);
    const ent={nome,acertos,total,pct};
    if (idx>=0) historico[idx]=ent; else historico.push(ent);
    atualizarBadge();
}

function syncCalib(key,input,dec,spanId) {
    cfg[key]=parseFloat(input.value);
    document.getElementById(spanId).innerText=cfg[key].toFixed(dec);
    if (congelado && dadosAtuais && imgCongelada) {
        ctx.putImageData(imgCongelada,0,0);
        processar(dadosAtuais.code,dadosAtuais.gabarito,dadosAtuais.nome,imgCongelada);
    }
}
function abrirCalib()  { document.getElementById('drawer-calib').classList.add('aberto'); }
function fecharCalib() { document.getElementById('drawer-calib').classList.remove('aberto'); }
function copiarConfig() {
    const t=`offsetY:${cfg.offsetY.toFixed(3)}, gapV:${cfg.gapV.toFixed(3)}, threshold:${cfg.threshold}`;
    navigator.clipboard.writeText(t).catch(()=>{});
    showToast('Copiado!');
}

function atualizarBadge() {
    document.getElementById('hist-badge').innerText=historico.length;
    document.getElementById('hist-count-label').innerText=historico.length;
}
function abrirDrawer() {
    const lista=document.getElementById('drawer-lista'), resumo=document.getElementById('drawer-resumo');
    if (!historico.length) { lista.innerHTML='<div class="drawer-vazio">Nenhuma prova ainda.</div>'; resumo.innerText=''; }
    else {
        const media=Math.round(historico.reduce((s,h)=>s+h.pct,0)/historico.length);
        resumo.innerText=`média ${media}%`;
        lista.innerHTML=historico.slice().sort((a,b)=>b.acertos-a.acertos).map(h=>`
            <div class="historico-item">
                <div><div class="hist-nome">${h.nome}</div><div class="hist-pct">${h.pct}%</div></div>
                <div class="hist-nota">${h.acertos}<span style="color:var(--muted);font-size:12px">/${h.total}</span></div>
            </div>`).join('');
    }
    document.getElementById('drawer').classList.add('aberto');
}
function fecharDrawer() { document.getElementById('drawer').classList.remove('aberto'); }
function exportarCSV() {
    if (!historico.length) { showToast('Nenhum resultado ainda'); return; }
    const l=['Nome,Acertos,Total,Porcentagem'];
    historico.forEach(h=>l.push(`"${h.nome}",${h.acertos},${h.total},${h.pct}%`));
    const url=URL.createObjectURL(new Blob([l.join('\n')],{type:'text/csv;charset=utf-8;'}));
    Object.assign(document.createElement('a'),{href:url,download:'resultados_omr.csv'}).click();
    URL.revokeObjectURL(url);
    showToast('CSV exportado!');
}
</script>
