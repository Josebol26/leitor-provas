<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Pro - Versão Estável</title>
    
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="cv['onRuntimeInitialized']=()=>{window.cvReady=true;}"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --success: #22c55e; }
        body { background: var(--bg); color: #f1f5f9; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #video-container { 
            position: relative; width: 100vw; height: 55vh; background: #000; overflow: hidden;
            border-bottom: 3px solid var(--accent);
        }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* Linha de Varredura que você gostou */
        .scan-line {
            position: absolute; width: 100%; height: 3px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            top: 50%;
            animation: scan 2.5s infinite ease-in-out;
            z-index: 10;
        }
        @keyframes scan { 0% { top: 10%; } 50% { top: 90%; } 100% { top: 10%; } }

        .ui-panel { padding: 15px; width: 90%; max-width: 500px; display: flex; flex-direction: column; gap: 10px; }
        #status-card { 
            padding: 20px; border-radius: 15px; background: var(--card); border: 2px solid #334155; 
            text-align: center; min-height: 120px; transition: 0.3s;
        }
        .is-success { border-color: var(--success) !important; background: #064e3b !important; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { 
            background: #334155; color: white; border: none; padding: 14px; 
            border-radius: 10px; font-weight: bold; cursor: pointer;
        }
        .btn-torch { background: #3b82f6; }
        .info-small { font-family: monospace; font-size: 11px; color: #94a3b8; margin-top: 8px; }
    </style>
</head>
<body>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="scan-line"></div>
</div>

<div class="ui-panel">
    <div id="status-card">
        <div id="msg" style="font-size: 1.2em;">Posicione o QR Code</div>
    </div>

    <div class="controls">
        <button class="btn-torch" onclick="alternarLanterna()">🔦 LANTERNA</button>
        <button onclick="location.reload()">🔄 REINICIAR</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusCard = document.getElementById('status-card');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    let processando = false;
    let lanternaAtiva = false;

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1280 } } 
    }).then(stream => { 
        video.srcObject = stream; 
        video.play(); 
        requestAnimationFrame(tick); 
    });

    async function alternarLanterna() {
        const track = video.srcObject.getVideoTracks()[0];
        try {
            lanternaAtiva = !lanternaAtiva;
            await track.applyConstraints({ advanced: [{ torch: lanternaAtiva }] });
        } catch (e) { alert("Lanterna não suportada"); }
    }

    function tick() {
        if (video.readyState === video.HAVE_ENOUGH_DATA && !processando) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imageData.data, imageData.width, imageData.height);

            if (code) {
                corrigir(code);
            }
        }
        requestAnimationFrame(tick);
    }

    function corrigir(qr) {
        if (!window.cvReady) return;
        processando = true;

        try {
            let src = cv.imread(canvas);
            let gray = new cv.Mat();
            let thresh = new cv.Mat();
            cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

            // Filtro de nitidez para evitar os erros de leitura que você teve
            cv.threshold(gray, thresh, 120, 255, cv.THRESH_BINARY_INV + cv.THRESH_OTSU);

            const loc = qr.location;
            const d_qr = Math.sqrt(Math.pow(loc.topLeftCorner.x - loc.topRightCorner.x, 2) + Math.pow(loc.topLeftCorner.y - loc.topRightCorner.y, 2));

            // Coordenadas estáveis (Calibragem José Luiz)
            let start_x = loc.topLeftCorner.x - (d_qr * 1.74);
            let start_y = loc.topLeftCorner.y + (d_qr * 2.05);
            let esp_lin = d_qr * 0.340;
            let esp_col = d_qr * 0.625;
            let raio = Math.round(d_qr * 0.16);

            let partes = qr.data.split('|');
            let nome = "Aluno"; let gabarito = "";
            partes.forEach(p => {
                if(p.startsWith("AL:")) nome = p.replace("AL:", "").trim();
                if(p.startsWith("GB:")) gabarito = p.replace("GB:", "").trim();
            });

            let acertos = 0;
            let lido = "";
            const alts = ['A', 'B', 'C', 'D', 'E'];

            for (let q = 0; q < 15; q++) {
                let y_at = Math.round(start_y + (q * esp_lin));
                let max_v = -1; let sel = -1;

                for (let a = 0; a < 5; a++) {
                    let x_at = Math.round(start_x + (a * esp_col));
                    let rx = Math.round(x_at - raio);
                    let ry = Math.round(y_at - raio);

                    if (rx > 0 && ry > 0 && (rx + raio*2) < thresh.cols && (ry + raio*2) < thresh.rows) {
                        let rect = new cv.Rect(rx, ry, raio*2, raio*2);
                        let roi = thresh.roi(rect);
                        let count = cv.countNonZero(roi);
                        if (count > max_v) { max_v = count; sel = a; }
                        roi.delete();
                    }
                }

                // SUBIMOS O RIGOR: Agora exige 80% da área (ajustado para ser certeiro)
                if (max_v > (raio * raio * 0.8)) { 
                    lido += alts[sel];
                    if (gabarito && q < gabarito.length && alts[sel] === gabarito[q].toUpperCase()) {
                        acertos++;
                    }
                } else {
                    lido += "_";
                }
            }

            statusCard.classList.add('is-success');
            statusCard.innerHTML = `
                <div style="font-weight:bold; font-size:20px;">${nome}</div>
                <div style="font-size:35px; margin:10px 0;">${acertos}/15</div>
                <div class="info-small">Lido: ${lido}</div>
                <div style="font-size:11px; color:#fff; margin-top:10px;">TOQUE PARA PRÓXIMO</div>
            `;

            src.delete(); gray.delete(); thresh.delete();
        } catch (e) {
            processando = false;
        }
    }

    window.onclick = () => { 
        if(processando) {
            processando = false; 
            statusCard.classList.remove('is-success');
            statusCard.innerHTML = '<div style="font-size: 1.2em;">Posicione o QR Code</div>';
        }
    };
</script>
</body>
</html>
