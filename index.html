<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuGerador Scanner</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { padding: 15px; background: #1e1e1e; width: 100%; text-align: center; color: #228B22; border-bottom: 2px solid #333; }
        #video-container { position: relative; width: 90vw; height: 55vh; margin-top: 15px; border: 2px solid #444; border-radius: 12px; overflow: hidden; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .target { position: absolute; top: 10%; right: 10%; width: 70px; height: 70px; border: 3px dashed #228B22; border-radius: 5px; opacity: 0.6; }
        .controls { padding: 20px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        button { background: #228B22; color: white; border: none; padding: 18px; border-radius: 10px; font-size: 18px; font-weight: bold; width: 85%; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #333; color: #777; }
        #status { width: 85%; padding: 12px; border-radius: 8px; text-align: center; background: #1e1e1e; font-size: 1.1rem; border: 1px solid #333; }
        .success { border-color: #228B22 !important; background: #1b5e20 !important; }
        .error { border-color: #b71c1c !important; background: #451010 !important; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="header"><h3>MEUGERADOR MÓVEL V6</h3></div>

<div id="video-container">
    <video id="video" playsinline></video>
    <div class="target"></div>
</div>

<div class="controls">
    <div id="status">Carregando motor...</div>
    <button id="btn" onclick="corrigir()" disabled>CORRIGIR AGORA</button>
</div>

<canvas id="canvasInput"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    const canvas = document.getElementById('canvasInput');

    let cvReady = false;

    function onOpenCvReady() {
        cvReady = true;
        status.innerText = "Motor Pronto! Alinhe o QR Code.";
        btn.disabled = false;
    }

    // Configuração robusta da câmera
    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
    }).then(stream => {
        video.srcObject = stream;
        video.play();
    }).catch(e => { status.innerText = "Erro câmera: " + e.message; });

    function corrigir() {
        if (!cvReady || video.readyState < 2) return;
        
        status.className = "";
        status.innerText = "Processando...";
        
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        // Uso de setTimeout para não travar a interface do celular
        setTimeout(() => {
            let src, gray, points, detector, blurred, thresh;
            try {
                src = cv.imread(canvas);
                gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

                detector = new cv.QRCodeDetector();
                points = new cv.Mat();
                let code = detector.decode(gray, points);

                if (code && points.cols > 0) {
                    // CALIBRAGEM V3.3 - Com travas matemáticas Math.round e Math.max
                    let p0x = points.floatAt(0, 0);
                    let p0y = points.floatAt(0, 1);
                    let p1x = points.floatAt(0, 2);
                    let p1y = points.floatAt(0, 3);
                    
                    let larg_qr = Math.sqrt(Math.pow(p0x - p1x, 2) + Math.pow(p0y - p1y, 2));

                    let start_x = p0x - (larg_qr * 1.74);
                    let start_y = p0y + (larg_qr * 2.05);
                    let esp_lin = larg_qr * 0.340;
                    let esp_col = larg_qr * 0.625;
                    let raio = Math.max(1, Math.round(larg_qr * 0.16));

                    blurred = new cv.Mat();
                    thresh = new cv.Mat();
                    cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
                    cv.adaptiveThreshold(blurred, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                    let acertos = 0;
                    let dados = code.split('|');
                    let aluno = dados[0].replace("AL:", "");
                    let gabarito = dados[1] ? dados[1].replace("GB:", "").trim() : "";
                    const alternativas = ['A', 'B', 'C', 'D', 'E'];

                    for (let q = 0; q < 15; q++) {
                        let y_at = Math.round(start_y + (q * esp_lin));
                        let max_count = -1;
                        let sel_idx = -1;

                        for (let a = 0; a < 5; a++) {
                            let x_at = Math.round(start_x + (a * esp_col));
                            
                            // TRAVA DE SEGURANÇA: Verifica se o retângulo está dentro da imagem
                            let rx = x_at - raio;
                            let ry = y_at - raio;
                            let rw = raio * 2;
                            let rh = raio * 2;

                            if (rx > 0 && ry > 0 && (rx + rw) < thresh.cols && (ry + rh) < thresh.rows) {
                                let rect = new cv.Rect(rx, ry, rw, rh);
                                let roi = thresh.roi(rect);
                                let count = cv.countNonZero(roi);
                                if (count > max_count) {
                                    max_count = count;
                                    sel_idx = a;
                                }
                                roi.delete();
                            }
                        }

                        // Sensibilidade de preenchimento
                        if (max_count > (raio * raio * 1.8)) { 
                            if (gabarito && q < gabarito.length && alternativas[sel_idx] === gabarito[q]) {
                                acertos += 1;
                            }
                        }
                    }

                    status.className = "success";
                    status.innerHTML = `<b>${aluno}</b><br>NOTA: ${acertos}/15`;
                } else {
                    status.className = "error";
                    status.innerText = "QR Code não detectado.";
                }
            } catch (e) {
                console.error("ERRO OPENCV:", e);
                status.className = "error";
                status.innerText = "Erro de leitura. Tente novamente.";
            } finally {
                // LIMPEZA OBRIGATÓRIA PARA NÃO TRAVAR O CELULAR
                if (src) src.delete();
                if (gray) gray.delete();
                if (points) points.delete();
                if (detector) detector.delete();
                if (blurred) blurred.delete();
                if (thresh) thresh.delete();
            }
        }, 60);
    }
</script>
</body>

<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="onOpenCvReady()"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { padding: 15px; background: #1e1e1e; width: 100%; text-align: center; color: #228B22; border-bottom: 2px solid #333; }
        #video-container { position: relative; width: 90vw; height: 60vh; margin-top: 15px; border: 2px solid #444; border-radius: 12px; overflow: hidden; }

<div class="header">

</div>

<div class="controls">
    <div id="status">Iniciando motor gráfico...</div>
    <button id="btn" onclick="corrigir()" disabled>CORRIGIR AGORA</button>
</div>

<canvas id="canvasInput"></canvas>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn');
    const canvas = document.getElementById('canvasInput');

    let cvReady = false;

    function onOpenCvReady() {
        cvReady = true;
        status.innerText = "Motor Pronto. Alinhe o QR Code.";
        btn.disabled = false;
        console.log("OpenCV carregado com sucesso.");
    }

    navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "environment", width: 1280, height: 720 } 
    }).then(stream => {
        video.srcObject = stream;
        video.play();
    });

    function corrigir() {
        if (!cvReady) return;
        status.className = "";
        status.innerText = "Processando...";
        
        // 1. Captura o Frame
        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        setTimeout(() => {
            let src, gray, points, detector, blurred, thresh;
            try {
                src = cv.imread(canvas);
                gray = new cv.Mat();
                cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

                detector = new cv.QRCodeDetector();
                points = new cv.Mat();
                let code = detector.decode(gray, points);

                if (code) {
                    // CALIBRAGEM V3.3
                    let p0x = points.floatAt(0, 0);
                    let p0y = points.floatAt(0, 1);
                    let p1x = points.floatAt(0, 2);
                    let p1y = points.floatAt(0, 3);
                    let larg_qr = Math.sqrt(Math.pow(p0x - p1x, 2) + Math.pow(p0y - p1y, 2));

                    let start_x = p0x - (larg_qr * 1.74);
                    let start_y = p0y + (larg_qr * 2.05);
                    let esp_lin = larg_qr * 0.340;
                    let esp_col = larg_qr * 0.625;
                    let raio = Math.round(larg_qr * 0.16);

                    blurred = new cv.Mat();
                    thresh = new cv.Mat();
                    cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
                    cv.adaptiveThreshold(blurred, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                    let acertos = 0;
                    let dados = code.split('|');
                    let aluno = dados[0].replace("AL:", "");
                    let gabarito = dados[1] ? dados[1].replace("GB:", "").trim() : "";
                    const alternativas = ['A', 'B', 'C', 'D', 'E'];

                    for (let q = 0; q < 15; q++) {
                        let y_at = Math.round(start_y + (q * esp_lin));
                        let max_count = -1;
                        let sel_idx = -1;

                        for (let a = 0; a < 5; a++) {
                            let x_at = Math.round(start_x + (a * esp_col));
                            
                            // Medição simplificada de preenchimento (ROI)
                            let rect = new cv.Rect(x_at - raio, y_at - raio, raio * 2, raio * 2);
                            if (rect.x > 0 && rect.y > 0 && rect.x + rect.width < thresh.cols && rect.y + rect.height < thresh.rows) {
                                let roi = thresh.roi(rect);
                                let count = cv.countNonZero(roi);
                                if (count > max_count) {
                                    max_count = count;
                                    sel_idx = a;
                                }
                                roi.delete();
                            }
                        }

                        if (max_count > (raio * raio * 2.5)) { // Ajuste de sensibilidade
                            if (gabarito && q < gabarito.length && alternativas[sel_idx] === gabarito[q]) {
                                acertos += 1;
                            }
                        }
                    }

                    status.className = "success";
                    status.innerHTML = `<b>${aluno}</b><br>NOTA: ${acertos}/15`;
                } else {
                    status.className = "error";
                    status.innerText = "QR Code não detectado.";
                }
            } catch (e) {
                console.error(e);
                status.className = "error";
                status.innerText = "Erro no motor. Reinicie a página.";
            } finally {
                // LIMPEZA CRÍTICA DE MEMÓRIA (Evita a falha gráfica)
                if (src) src.delete();
                if (gray) gray.delete();
                if (points) points.delete();
                if (detector) detector.delete();
                if (blurred) blurred.delete();
                if (thresh) thresh.delete();
            }
        }, 50);
    }
</script>
