<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR PDF — Correção em Lote</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#080c10; --surface:#0e1419; --border:#1e2a35;
            --accent:#00e5ff; --accent2:#00ff9d; --danger:#ff3d5a;
            --text:#e8f0f5; --muted:#52687a; --card:#111922;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        html, body { height:100%; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        /* ── LAYOUT ── */
        .app { display:grid; grid-template-columns:340px 1fr; min-height:100vh; }

        /* ── SIDEBAR ── */
        .sidebar {
            background:var(--surface); border-right:1px solid var(--border);
            padding:28px 24px; display:flex; flex-direction:column; gap:24px;
            position:sticky; top:0; height:100vh; overflow-y:auto;
        }
        .brand { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--accent); text-transform:uppercase; }
        .brand span { color:var(--muted); }
        h1 { font-size:22px; font-weight:800; line-height:1.2; }
        h1 em { color:var(--accent2); font-style:normal; }

        /* Upload zone */
        .upload-zone {
            border:2px dashed var(--border); border-radius:16px;
            padding:32px 20px; text-align:center; cursor:pointer;
            transition:all .25s; background:var(--bg); position:relative;
        }
        .upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:rgba(0,229,255,.04); }
        .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; }
        .upload-icon { font-size:36px; margin-bottom:10px; }
        .upload-label { font-size:13px; font-weight:700; color:var(--accent); }
        .upload-sub { font-size:11px; color:var(--muted); margin-top:4px; }

        /* Config */
        .section-title { font-size:10px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:6px; }
        .config-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; font-size:12px; }
        .config-row label { width:72px; text-align:right; flex-shrink:0; color:var(--muted); font-family:'Space Mono',monospace; font-size:10px; }
        .config-row input[type=range] { flex:1; accent-color:var(--accent); }
        .config-row .cval { width:50px; font-family:'Space Mono',monospace; font-size:11px; color:var(--accent); flex-shrink:0; }

        /* Botões sidebar */
        .btn-proc {
            width:100%; padding:14px; border:none; border-radius:12px;
            background:var(--accent2); color:var(--bg);
            font-family:'Syne',sans-serif; font-weight:800; font-size:15px;
            cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .btn-proc:hover { filter:brightness(1.1); }
        .btn-proc:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; filter:none; }
        .btn-csv {
            width:100%; padding:12px; border:1px solid var(--border); border-radius:12px;
            background:transparent; color:var(--text);
            font-family:'Syne',sans-serif; font-weight:700; font-size:13px;
            cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px;
        }
        .btn-csv:hover { border-color:var(--accent2); color:var(--accent2); }
        .btn-csv:disabled { opacity:.4; cursor:not-allowed; }

        /* ── MAIN ── */
        .main { padding:32px; overflow-y:auto; }

        /* Progresso */
        .progress-bar-wrap { background:var(--border); border-radius:99px; height:6px; margin-bottom:6px; overflow:hidden; display:none; }
        .progress-bar-wrap.visivel { display:block; }
        .progress-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s; }
        .progress-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:24px; min-height:16px; }

        /* Stats */
        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
        .stat-val { font-family:'Space Mono',monospace; font-size:30px; font-weight:700; line-height:1; }
        .stat-val.verde { color:var(--accent2); }
        .stat-val.azul  { color:var(--accent); }
        .stat-val.warn  { color:#ffd600; }
        .stat-lbl { font-size:11px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.06em; }

        /* Tabela */
        .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead th { background:var(--surface); padding:12px 16px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:700; border-bottom:1px solid var(--border); }
        tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:rgba(255,255,255,.03); }
        tbody td { padding:12px 16px; font-size:13px; vertical-align:middle; }
        .td-nome { font-weight:700; }
        .td-nota { font-family:'Space Mono',monospace; font-weight:700; font-size:15px; }
        .td-nota.alta  { color:var(--accent2); }
        .td-nota.media { color:#ffd600; }
        .td-nota.baixa { color:var(--danger); }
        .td-pct { font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); }

        /* Mini barra na tabela */
        .mini-bar { width:80px; height:4px; background:var(--border); border-radius:99px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:8px; }
        .mini-bar-fill { height:100%; border-radius:99px; }

        /* Badge status */
        .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:700; letter-spacing:.05em; }
        .badge.ok  { background:rgba(0,255,157,.15); color:var(--accent2); }
        .badge.err { background:rgba(255,61,90,.15);  color:var(--danger); }

        /* Preview thumb */
        .thumb-wrap { display:flex; gap:8px; align-items:center; }
        .thumb { width:36px; height:50px; border-radius:4px; object-fit:cover; border:1px solid var(--border); flex-shrink:0; }
        .thumb-placeholder { width:36px; height:50px; border-radius:4px; background:var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:16px; }

        /* Estado vazio */
        .empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
        .empty-state .ei { font-size:56px; margin-bottom:16px; opacity:.4; }
        .empty-state p { font-size:14px; }

        @media (max-width: 700px) {
            .app { grid-template-columns:1fr; }
            .sidebar { position:static; height:auto; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
        <div>
            <div class="brand">OMR<span>/</span>PDF</div>
            <h1 style="margin-top:8px">Correção<br>em <em>Lote</em></h1>
        </div>

        <!-- Upload -->
        <div>
            <div class="section-title">Arquivo PDF</div>
            <div class="upload-zone" id="upload-zone">
                <input type="file" accept="application/pdf" id="file-input">
                <div class="upload-icon">📄</div>
                <div class="upload-label" id="upload-label">Clique ou arraste o PDF</div>
                <div class="upload-sub" id="upload-sub">Uma folha por página</div>
            </div>
        </div>

        <!-- Config calibração -->
        <div>
            <div class="section-title">Calibração</div>
            <div class="config-row"><label>Offset X</label><input type="range" min="-4" max="0" step="0.005" value="-2.175" oninput="C('offsetX',this,3,'vX')"><span class="cval" id="vX">-2.175</span></div>
            <div class="config-row"><label>Offset Y</label><input type="range" min="-1" max="3"  step="0.005" value="1.560"  oninput="C('offsetY',this,3,'vY')"><span class="cval" id="vY">1.560</span></div>
            <div class="config-row"><label>Gap H</label>   <input type="range" min="0.1" max="1.0" step="0.001" value="0.611" oninput="C('gapH',this,3,'vGH')"><span class="cval" id="vGH">0.611</span></div>
            <div class="config-row"><label>Gap V</label>   <input type="range" min="0.1" max="0.8" step="0.001" value="0.335" oninput="C('gapV',this,3,'vGV')"><span class="cval" id="vGV">0.335</span></div>
            <div class="config-row"><label>Col Gap</label> <input type="range" min="0.5" max="3.0" step="0.005" value="1.680" oninput="C('colGap',this,3,'vCG')"><span class="cval" id="vCG">1.680</span></div>
            <div class="config-row"><label>Threshold</label><input type="range" min="30" max="250" step="1" value="81" oninput="C('threshold',this,0,'vTH')"><span class="cval" id="vTH">81</span></div>
        </div>

        <!-- Ações -->
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:auto">
            <button class="btn-proc" id="btn-proc" onclick="processar()" disabled>
                ▶ PROCESSAR PDF
            </button>
            <button class="btn-csv" id="btn-csv" onclick="exportCSV()" disabled>
                ⬇️ Exportar CSV
            </button>
        </div>
    </aside>

    <!-- ── MAIN ── -->
    <main class="main">
        <div class="progress-bar-wrap" id="prog-wrap">
            <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="prog-label"></div>

        <!-- Stats -->
        <div class="stats-row" id="stats-row" style="display:none">
            <div class="stat-card">
                <div class="stat-val azul" id="st-total">0</div>
                <div class="stat-lbl">Folhas</div>
            </div>
            <div class="stat-card">
                <div class="stat-val verde" id="st-media">—</div>
                <div class="stat-lbl">Média %</div>
            </div>
            <div class="stat-card">
                <div class="stat-val warn" id="st-erros">0</div>
                <div class="stat-lbl">Sem leitura</div>
            </div>
        </div>

        <!-- Tabela -->
        <div class="table-wrap" id="table-wrap">
            <div class="empty-state" id="empty-state">
                <div class="ei">📋</div>
                <p>Faça o upload do PDF e clique em<br><strong>PROCESSAR PDF</strong></p>
            </div>
            <table id="tabela" style="display:none">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Prévia</th>
                        <th>Aluno</th>
                        <th>Nota</th>
                        <th>%</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
// ── PDF.js worker ──
pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── Config ──
const cfg = {
    offsetX:-2.175, offsetY:1.560,
    gapH:0.611,     gapV:0.335,
    colGap:1.680,   threshold:81
};
function C(k,el,dec,spanId) {
    cfg[k] = parseFloat(el.value);
    document.getElementById(spanId).innerText = cfg[k].toFixed(dec);
}

// ── Upload ──
let pdfFile = null;
const fileInput    = document.getElementById('file-input');
const uploadZone   = document.getElementById('upload-zone');
const uploadLabel  = document.getElementById('upload-label');
const uploadSub    = document.getElementById('upload-sub');
const btnProc      = document.getElementById('btn-proc');

fileInput.addEventListener('change', e => setPDF(e.target.files[0]));
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') setPDF(f);
});

function setPDF(f) {
    pdfFile = f;
    uploadLabel.innerText = f.name;
    uploadSub.innerText   = 'Pronto para processar';
    btnProc.disabled = false;
}

// ── Progresso ──
function setProgress(pct, txt) {
    document.getElementById('prog-wrap').classList.add('visivel');
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').innerText  = txt;
}

// ── Renderiza página PDF → ImageData ──
async function renderizarPagina(page, scale = 2.5) {
    const vp  = page.getViewport({ scale });
    const off = new OffscreenCanvas(vp.width, vp.height);
    const ctx2 = off.getContext('2d');
    await page.render({ canvasContext: ctx2, viewport: vp }).promise;
    return ctx2.getImageData(0, 0, vp.width, vp.height);
}

// ── Lê bolinhas usando QR como âncora ──
function lerBolinhas(qr, imgData) {
    const tl = qr.location.topLeftCorner,    tr = qr.location.topRightCorner;
    const bl = qr.location.bottomLeftCorner, br = qr.location.bottomRightCorner;
    const qrW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
    const qrH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
    const size = (qrW + qrH) / 2;
    const cx   = (tl.x + br.x) / 2, cy = (tl.y + br.y) / 2;
    const ux = (tr.x-tl.x)/qrW, uy = (tr.y-tl.y)/qrW;
    const vx = (bl.x-tl.x)/qrH, vy = (bl.y-tl.y)/qrH;

    const d = imgData.data, W = imgData.width, H = imgData.height;

    const match = qr.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
    if (!match) return null;
    const nome = match[1], gabarito = match[2];

    let acertos = 0;
    const detalhes = []; // {questao, marcada, correta, acertou}

    for (let i = 0; i < gabarito.length; i++) {
        const col = Math.floor(i/30), lin = i%30;
        const bx  = cfg.offsetX + col*cfg.colGap;
        const by  = cfg.offsetY + lin*cfg.gapV;
        let marcada = -1, maxEsc = 0;

        for (let alt = 0; alt < 5; alt++) {
            const nx = bx + alt*cfg.gapH, ny = by;
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x<1||x>W-2||y<1||y>H-2) continue;

            let esc = 0;
            for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) {
                const px=Math.floor(x+dx), py=Math.floor(y+dy);
                const idx=(py*W+px)*4;
                esc += 255-((d[idx]+d[idx+1]+d[idx+2])/3);
            }
            esc /= 9;
            if (esc > cfg.threshold && esc > maxEsc) { maxEsc=esc; marcada=alt; }
        }

        const letraMarcada = marcada >= 0 ? String.fromCharCode(65+marcada) : '?';
        const acertou = letraMarcada === gabarito[i];
        if (acertou) acertos++;
        detalhes.push({ q:i+1, marcada:letraMarcada, correta:gabarito[i], acertou });
    }

    return { nome, gabarito, acertos, total:gabarito.length, detalhes };
}

// ── Gera thumbnail da página ──
async function gerarThumb(page) {
    const vp  = page.getViewport({ scale: 0.15 });
    const off = new OffscreenCanvas(vp.width, vp.height);
    const ctx2 = off.getContext('2d');
    await page.render({ canvasContext:ctx2, viewport:vp }).promise;
    const blob = await off.convertToBlob({ type:'image/jpeg', quality:0.7 });
    return URL.createObjectURL(blob);
}

// ── PROCESSAR ──
let resultados = [];

async function processar() {
    if (!pdfFile) return;
    btnProc.disabled = true;
    resultados = [];

    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('tabela').style.display = 'none';
    document.getElementById('tbody').innerHTML = '';
    document.getElementById('stats-row').style.display = 'none';

    const arrayBuf = await pdfFile.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    const total = pdf.numPages;

    setProgress(0, `Processando 0 de ${total} páginas...`);

    for (let p = 1; p <= total; p++) {
        setProgress(Math.round((p-1)/total*100), `Página ${p} de ${total}...`);

        const page    = await pdf.getPage(p);
        const imgData = await renderizarPagina(page, 2.5);
        const thumbURL = await gerarThumb(page);

        // Detecta QR
        const code = jsQR(imgData.data, imgData.width, imgData.height);
        let resultado = null;

        if (code && code.data.includes('|GB:')) {
            resultado = lerBolinhas(code, imgData);
        }

        resultados.push({ pagina: p, resultado, thumbURL });
        adicionarLinha(p, resultado, thumbURL);
    }

    setProgress(100, `✅ ${total} páginas processadas.`);
    document.getElementById('tabela').style.display = 'table';
    atualizarStats();
    document.getElementById('btn-csv').disabled = false;
    btnProc.disabled = false;
}

// ── Adiciona linha na tabela ──
function adicionarLinha(pag, r, thumb) {
    const tbody = document.getElementById('tbody');
    const tr = document.createElement('tr');

    if (!r) {
        tr.innerHTML = `
            <td style="color:var(--muted);font-family:'Space Mono',monospace">${String(pag).padStart(2,'0')}</td>
            <td><div class="thumb-placeholder">📄</div></td>
            <td class="td-nome" style="color:var(--muted)">Não identificado</td>
            <td>—</td><td>—</td>
            <td><span class="badge err">SEM QR</span></td>`;
    } else {
        const pct  = Math.round((r.acertos/r.total)*100);
        const cls  = pct >= 70 ? 'alta' : pct >= 50 ? 'media' : 'baixa';
        const barC = pct >= 70 ? 'var(--accent2)' : pct >= 50 ? '#ffd600' : 'var(--danger)';
        tr.innerHTML = `
            <td style="color:var(--muted);font-family:'Space Mono',monospace">${String(pag).padStart(2,'0')}</td>
            <td><img class="thumb" src="${thumb}" alt="pg${pag}"></td>
            <td class="td-nome">${r.nome}</td>
            <td class="td-nota ${cls}">${r.acertos}/${r.total}</td>
            <td class="td-pct">
                ${pct}%
                <span class="mini-bar"><span class="mini-bar-fill" style="width:${pct}%;background:${barC}"></span></span>
            </td>
            <td><span class="badge ok">OK</span></td>`;
    }
    tbody.appendChild(tr);
}

// ── Estatísticas ──
function atualizarStats() {
    const ok     = resultados.filter(r => r.resultado);
    const erros  = resultados.length - ok.length;
    const medPct = ok.length
        ? Math.round(ok.reduce((s,r) => s + r.resultado.acertos/r.resultado.total*100, 0) / ok.length)
        : 0;

    document.getElementById('st-total').innerText = resultados.length;
    document.getElementById('st-media').innerText = ok.length ? medPct + '%' : '—';
    document.getElementById('st-erros').innerText = erros;
    document.getElementById('stats-row').style.display = 'grid';
}

// ── Exportar CSV ──
function exportCSV() {
    const linhas = ['Página,Nome,Acertos,Total,Porcentagem,Gabarito'];
    resultados.forEach(({pagina, resultado: r}) => {
        if (r) linhas.push(`${pagina},"${r.nome}",${r.acertos},${r.total},${Math.round(r.acertos/r.total*100)}%,"${r.gabarito}"`);
        else   linhas.push(`${pagina},"SEM LEITURA",,,,""`);
    });
    const blob = new Blob([linhas.join('\n')], {type:'text/csv;charset=utf-8;'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href=url; a.download='resultados_omr.csv'; a.click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
