<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeuGerador - Web Scanner</title>
    <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript"></script>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        .container { padding: 20px; }
        #video-container { position: relative; display: inline-block; width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; border: 2px solid #333; }
        video { width: 100%; display: block; }
        .target-box { position: absolute; top: 10%; right: 10%; width: 80px; height: 80px; border: 3px dashed #00ff00; border-radius: 8px; box-shadow: 0 0 10px rgba(0,255,0,0.5); }
        .controls { margin-top: 20px; }
        button { background: #228B22; color: white; border: none; padding: 15px 35px; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.95); }
        #status { margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 1.2rem; min-height: 50px; }
        .success { background: #1b5e20; color: #fff; }
        .error { background: #b71c1c; color: #fff; }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>MeuGerador Web</h2>
    <div id="video-container">
        <video id="video" playsinline></video>
        <div class="target-box"></div>
    </div>

    <div class="controls">
        <button onclick="corrigir()">CAPTURAR E CORRIGIR</button>
    </div>

    <div id="status">Aguardando OpenCV...</div>
    <canvas id="canvasOutput"></canvas>
</div>

<script>
    const video = document.getElementById('video');
    const status = document.getElementById('status');
    const canvas = document.getElementById('canvasOutput');

    // Inicializa a câmera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => {
            video.srcObject = stream;
            video.play();
        });

    // Avisa quando o OpenCV estiver pronto
    var cvReady = false;
    window.onload = () => {
        status.innerText = "Carregando motor de visão...";
        setTimeout(() => {
            if(typeof cv !== 'undefined') {
                status.innerText = "Pronto para Corrigir";
                cvReady = true;
            }
        }, 3000);
    };

    function corrigir() {
        if (!cvReady) return;
        status.className = "";
        status.innerText = "Processando...";

        const ctx = canvas.getContext('2d');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

        let src = cv.imread(canvas);
        let gray = new cv.Mat();
        cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);

        // Detector de QR Code (Mesma lógica do Python)
        let detector = new cv.QRCodeDetector();
        let points = new cv.Mat();
        let code = detector.decode(gray, points);

        if (code) {
            try {
                // Pega os pontos do QR Code para calibragem
                let p0x = points.floatAt(0, 0);
                let p0y = points.floatAt(0, 1);
                let p1x = points.floatAt(0, 2);
                let p1y = points.floatAt(0, 3);
                
                // Cálculo da largura do QR (larg_qr)
                let larg_qr = Math.sqrt(Math.pow(p0x - p1x, 2) + Math.pow(p0y - p1y, 2));

                // --- SUA CALIBRAGEM V3.3 APLICADA ---
                let start_x = p0x - (larg_qr * 1.74);
                let start_y = p0y + (larg_qr * 2.05);
                let esp_lin = larg_qr * 0.340;
                let esp_col = larg_qr * 0.625;
                let raio = larg_qr * 0.16;

                // Processamento de imagem para OMR
                let blurred = new cv.Mat();
                let thresh = new cv.Mat();
                cv.GaussianBlur(gray, blurred, new cv.Size(5, 5), 0);
                cv.adaptiveThreshold(blurred, thresh, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

                let acertos = 0;
                let dados = code.split('|');
                let aluno = dados[0].replace("AL:", "");
                let gabarito = dados[1] ? dados[1].replace("GB:", "").trim() : "";
                let alternativas = ['A', 'B', 'C', 'D', 'E'];

                for (let q = 0; q < 15; q++) {
                    let y_at = start_y + (q * esp_lin);
                    let pixels_max = -1;
                    let idx_marcado = -1;

                    for (let a = 0; a < 5; a++) {
                        let x_at = start_x + (a * esp_col);
                        
                        // Criar máscara para a bolinha
                        let mask = cv.Mat.zeros(thresh.rows, thresh.cols, cv.CV_8U);
                        let center = new cv.Point(x_at, y_at);
                        cv.circle(mask, center, raio, new cv.Scalar(255), -1);
                        
                        let maskedThresh = new cv.Mat();
                        cv.bitwise_and(thresh, thresh, maskedThresh, mask);
                        let count = cv.countNonZero(maskedThresh);
                        
                        if (count > pixels_max) {
                            pixels_max = count;
                            idx_marcado = a;
                        }
                        mask.delete(); maskedThresh.delete();
                    }

                    if (pixels_max > (raio * raio * 0.75)) {
                        if (gabarito && q < gabarito.length && alternativas[idx_marcado] === gabarito[q]) {
                            acertos += 1;
                        }
                    }
                }

                status.className = "success";
                status.innerText = `ALUNO: ${aluno} | NOTA: ${acertos}/15`;

                blurred.delete(); thresh.delete();
            } catch (e) {
                status.className = "error";
                status.innerText = "Erro no cálculo. Centralize a folha.";
                console.error(e);
            }
        } else {
            status.className = "error";
            status.innerText = "QR Code não encontrado!";
        }

        src.delete(); gray.delete(); points.delete();
    }
</script>

</body>
</html>
