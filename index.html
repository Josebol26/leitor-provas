<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMR — Correção em Lote</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:#080c10; --surface:#0e1419; --border:#1e2a35;
            --accent:#00e5ff; --accent2:#00ff9d; --danger:#ff3d5a;
            --text:#e8f0f5; --muted:#52687a; --card:#111922;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        html, body { height:100%; }
        body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

        .app { display:grid; grid-template-columns:300px 1fr; min-height:100vh; }

        .sidebar { background:var(--surface); border-right:1px solid var(--border); padding:28px 22px; display:flex; flex-direction:column; gap:24px; position:sticky; top:0; height:100vh; overflow-y:auto; }
        .brand { font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.2em; color:var(--accent); }
        .brand span { color:var(--muted); }
        h1 { font-size:21px; font-weight:800; line-height:1.2; margin-top:6px; }
        h1 em { color:var(--accent2); font-style:normal; }

        .upload-zone { border:2px dashed var(--border); border-radius:16px; padding:28px 16px; text-align:center; cursor:pointer; transition:all .25s; background:var(--bg); position:relative; }
        .upload-zone:hover, .upload-zone.drag { border-color:var(--accent); background:rgba(0,229,255,.04); }
        .upload-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; }
        .upload-icon { font-size:32px; margin-bottom:8px; }
        .upload-label { font-size:13px; font-weight:700; color:var(--accent); }
        .upload-sub { font-size:11px; color:var(--muted); margin-top:3px; }

        .btn-proc { width:100%; padding:14px; border:none; border-radius:12px; background:var(--accent2); color:var(--bg); font-family:'Syne',sans-serif; font-weight:800; font-size:15px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-proc:hover:not(:disabled) { filter:brightness(1.1); }
        .btn-proc:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
        .btn-csv { width:100%; padding:12px; border:1px solid var(--border); border-radius:12px; background:transparent; color:var(--text); font-family:'Syne',sans-serif; font-weight:700; font-size:13px; cursor:pointer; transition:all .2s; display:flex; align-items:center; justify-content:center; gap:8px; }
        .btn-csv:hover:not(:disabled) { border-color:var(--accent2); color:var(--accent2); }
        .btn-csv:disabled { opacity:.4; cursor:not-allowed; }

        .main { padding:32px; overflow-y:auto; }

        .progress-bar-wrap { background:var(--border); border-radius:99px; height:6px; margin-bottom:6px; overflow:hidden; display:none; }
        .progress-bar-wrap.visivel { display:block; }
        .progress-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .3s; }
        .progress-label { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); margin-bottom:24px; min-height:16px; }

        .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:28px; }
        .stat-card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px; }
        .stat-val { font-family:'Space Mono',monospace; font-size:30px; font-weight:700; line-height:1; }
        .stat-val.verde { color:var(--accent2); }
        .stat-val.azul  { color:var(--accent); }
        .stat-val.warn  { color:#ffd600; }
        .stat-lbl { font-size:11px; color:var(--muted); margin-top:4px; text-transform:uppercase; letter-spacing:.06em; }

        .table-wrap { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
        table { width:100%; border-collapse:collapse; }
        thead th { background:var(--surface); padding:12px 16px; text-align:left; font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--muted); font-weight:700; border-bottom:1px solid var(--border); }
        tbody tr { border-bottom:1px solid var(--border); transition:background .15s; }
        tbody tr:last-child { border-bottom:none; }
        tbody tr:hover { background:rgba(255,255,255,.03); }
        tbody td { padding:12px 16px; font-size:13px; vertical-align:middle; }
        .td-nome { font-weight:700; }
        .td-nota { font-family:'Space Mono',monospace; font-weight:700; font-size:15px; }
        .td-nota.alta  { color:var(--accent2); }
        .td-nota.media { color:#ffd600; }
        .td-nota.baixa { color:var(--danger); }
        .td-pct { font-family:'Space Mono',monospace; font-size:12px; color:var(--muted); }
        .mini-bar { width:70px; height:4px; background:var(--border); border-radius:99px; overflow:hidden; display:inline-block; vertical-align:middle; margin-left:6px; }
        .mini-bar-fill { height:100%; border-radius:99px; }
        .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:10px; font-weight:700; }
        .badge.ok  { background:rgba(0,255,157,.15); color:var(--accent2); }
        .badge.err { background:rgba(255,61,90,.15); color:var(--danger); }
        .thumb { width:34px; height:48px; border-radius:4px; object-fit:cover; border:1px solid var(--border); }
        .thumb-ph { width:34px; height:48px; border-radius:4px; background:var(--border); display:flex; align-items:center; justify-content:center; font-size:14px; }

        .empty-state { text-align:center; padding:80px 20px; color:var(--muted); }
        .empty-state .ei { font-size:52px; margin-bottom:14px; opacity:.35; }
        .empty-state p { font-size:14px; line-height:1.6; }

        @media (max-width:680px) { .app { grid-template-columns:1fr; } .sidebar { position:static; height:auto; } }
    </style>
</head>
<body>
<div class="app">

    <aside class="sidebar">
        <div>
            <div class="brand">OMR<span>/</span>PDF</div>
            <h1>Correção<br>em <em>Lote</em></h1>
        </div>

        <div>
            <div class="upload-zone" id="upload-zone">
                <input type="file" accept="application/pdf" id="file-input">
                <div class="upload-icon">📄</div>
                <div class="upload-label" id="upload-label">Clique ou arraste o PDF</div>
                <div class="upload-sub" id="upload-sub">Uma folha por página</div>
            </div>
        </div>

        <div style="margin-top:auto; display:flex; flex-direction:column; gap:10px;">
            <button class="btn-proc" id="btn-proc" onclick="processar()" disabled>▶ PROCESSAR</button>
            <button class="btn-csv"  id="btn-csv"  onclick="exportCSV()"  disabled>⬇️ Exportar CSV</button>
        </div>
    </aside>

    <main class="main">
        <div class="progress-bar-wrap" id="prog-wrap">
            <div class="progress-bar-fill" id="prog-fill" style="width:0%"></div>
        </div>
        <div class="progress-label" id="prog-label"></div>

        <div class="stats-row" id="stats-row" style="display:none">
            <div class="stat-card"><div class="stat-val azul"  id="st-total">0</div><div class="stat-lbl">Folhas</div></div>
            <div class="stat-card"><div class="stat-val verde" id="st-media">—</div><div class="stat-lbl">Média</div></div>
            <div class="stat-card"><div class="stat-val warn"  id="st-erros">0</div><div class="stat-lbl">Sem leitura</div></div>
        </div>

        <div class="table-wrap">
            <div class="empty-state" id="empty-state">
                <div class="ei">📋</div>
                <p>Faça o upload do PDF<br>e clique em <strong>PROCESSAR</strong></p>
            </div>
            <table id="tabela" style="display:none">
                <thead>
                    <tr>
                        <th>#</th><th>Prévia</th><th>Aluno</th>
                        <th>Nota</th><th>%</th><th>Status</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </main>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// Calibração: offsets absolutos por coluna (A B C D E) — não assume gapH uniforme
const cfg = {
    colsX:    [-1.915, -1.573, -1.154, -0.598, -0.036], // offset normalizado de cada coluna
    offsetY:   0.883,
    gapV:      0.435,
    colGap:    1.680,
    threshold: 30   // baixo para fotos Google Drive (imagem mais clara)
};

let pdfFile = null;

document.getElementById('file-input').addEventListener('change', e => setPDF(e.target.files[0]));
const zone = document.getElementById('upload-zone');
zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag'); });
zone.addEventListener('dragleave', () => zone.classList.remove('drag'));
zone.addEventListener('drop', e => {
    e.preventDefault(); zone.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f?.type === 'application/pdf') setPDF(f);
});

function setPDF(f) {
    pdfFile = f;
    document.getElementById('upload-label').innerText = f.name;
    document.getElementById('upload-sub').innerText   = 'Pronto para processar';
    document.getElementById('btn-proc').disabled = false;
}

function setProgress(pct, txt) {
    document.getElementById('prog-wrap').classList.add('visivel');
    document.getElementById('prog-fill').style.width = pct + '%';
    document.getElementById('prog-label').innerText  = txt;
}

async function renderPage(page, scale = 2.0) {
    const vp  = page.getViewport({ scale });
    const off = new OffscreenCanvas(vp.width, vp.height);
    await page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise;
    return off.getContext('2d').getImageData(0, 0, vp.width, vp.height);
}

async function makeThumb(page) {
    const vp  = page.getViewport({ scale: 0.12 });
    const off = new OffscreenCanvas(vp.width, vp.height);
    await page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise;
    return URL.createObjectURL(await off.convertToBlob({ type:'image/jpeg', quality:.7 }));
}

function lerBolinhas(qr, imgData) {
    const match = qr.data.match(/AL:([^|]*)\|GB:([A-E]+)/);
    if (!match) return null;
    const nome = match[1], gabarito = match[2];

    const tl = qr.location.topLeftCorner,    tr = qr.location.topRightCorner;
    const bl = qr.location.bottomLeftCorner, br = qr.location.bottomRightCorner;
    const qrW  = Math.hypot(tr.x-tl.x, tr.y-tl.y);
    const qrH  = Math.hypot(bl.x-tl.x, bl.y-tl.y);
    const size = (qrW + qrH) / 2;
    const cx   = (tl.x + br.x) / 2, cy = (tl.y + br.y) / 2;
    const ux = (tr.x-tl.x)/qrW, uy = (tr.y-tl.y)/qrW;
    const vx = (bl.x-tl.x)/qrH, vy = (bl.y-tl.y)/qrH;

    const d = imgData.data, W = imgData.width, H = imgData.height;
    const AM = Math.max(3, Math.round(size * 0.04));
    let acertos = 0;

    for (let i = 0; i < gabarito.length; i++) {
        const col = Math.floor(i/30), lin = i%30;
        const ny  = cfg.offsetY + lin*cfg.gapV + col*0; // colGap não usado aqui
        let marcada = -1, maxEsc = 0;

        for (let alt = 0; alt < 5; alt++) {
            const nx = cfg.colsX[alt];
            const x  = cx + nx*size*ux + ny*size*vx;
            const y  = cy + nx*size*uy + ny*size*vy;
            if (x < 0 || x >= W || y < 0 || y >= H) continue;

            let esc = 0, cnt = 0;
            for (let dx=-AM; dx<=AM; dx++) for (let dy=-AM; dy<=AM; dy++) {
                const px = Math.min(Math.max(Math.floor(x+dx),0),W-1);
                const py = Math.min(Math.max(Math.floor(y+dy),0),H-1);
                const idx = (py*W+px)*4;
                esc += 255 - ((d[idx]+d[idx+1]+d[idx+2])/3);
                cnt++;
            }
            esc /= cnt;
            if (esc > cfg.threshold && esc > maxEsc) { maxEsc=esc; marcada=alt; }
        }
        if (marcada !== -1 && String.fromCharCode(65+marcada) === gabarito[i]) acertos++;
    }

    return { nome, gabarito, acertos, total: gabarito.length };
}

let resultados = [];

async function processar() {
    if (!pdfFile) return;
    document.getElementById('btn-proc').disabled = true;
    resultados = [];
    document.getElementById('empty-state').style.display = 'none';
    document.getElementById('tabela').style.display      = 'none';
    document.getElementById('tbody').innerHTML           = '';
    document.getElementById('stats-row').style.display  = 'none';

    const pdf   = await pdfjsLib.getDocument({ data: await pdfFile.arrayBuffer() }).promise;
    const total = pdf.numPages;

    for (let p = 1; p <= total; p++) {
        setProgress(Math.round((p-1)/total*100), `Página ${p} de ${total}...`);
        const page     = await pdf.getPage(p);
        const imgData  = await renderPage(page, 2.0);
        const thumbURL = await makeThumb(page);
        const code     = jsQR(imgData.data, imgData.width, imgData.height);
        const resultado = (code && code.data.includes('|GB:')) ? lerBolinhas(code, imgData) : null;
        resultados.push({ pagina:p, resultado, thumbURL });
        adicionarLinha(p, resultado, thumbURL);
    }

    setProgress(100, `✅ ${total} páginas processadas.`);
    document.getElementById('tabela').style.display = 'table';
    atualizarStats();
    document.getElementById('btn-csv').disabled  = false;
    document.getElementById('btn-proc').disabled = false;
}

function adicionarLinha(pag, r, thumbURL) {
    const tr  = document.createElement('tr');
    const num = String(pag).padStart(2,'0');
    if (!r) {
        tr.innerHTML = `
            <td style="color:var(--muted);font-family:'Space Mono',monospace">${num}</td>
            <td><div class="thumb-ph">📄</div></td>
            <td class="td-nome" style="color:var(--muted)">Não identificado</td>
            <td>—</td><td>—</td>
            <td><span class="badge err">SEM QR</span></td>`;
    } else {
        const pct  = Math.round((r.acertos/r.total)*100);
        const cls  = pct>=70?'alta':pct>=50?'media':'baixa';
        const barC = pct>=70?'var(--accent2)':pct>=50?'#ffd600':'var(--danger)';
        tr.innerHTML = `
            <td style="color:var(--muted);font-family:'Space Mono',monospace">${num}</td>
            <td><img class="thumb" src="${thumbURL}" alt="p${pag}"></td>
            <td class="td-nome">${r.nome}</td>
            <td class="td-nota ${cls}">${r.acertos}/${r.total}</td>
            <td class="td-pct">${pct}%<span class="mini-bar"><span class="mini-bar-fill" style="width:${pct}%;background:${barC}"></span></span></td>
            <td><span class="badge ok">OK</span></td>`;
    }
    document.getElementById('tbody').appendChild(tr);
}

function atualizarStats() {
    const ok    = resultados.filter(r => r.resultado);
    const erros = resultados.length - ok.length;
    const media = ok.length
        ? Math.round(ok.reduce((s,r) => s + r.resultado.acertos/r.resultado.total*100, 0) / ok.length)
        : 0;
    document.getElementById('st-total').innerText = resultados.length;
    document.getElementById('st-media').innerText = ok.length ? media+'%' : '—';
    document.getElementById('st-erros').innerText = erros;
    document.getElementById('stats-row').style.display = 'grid';
}

function exportCSV() {
    const linhas = ['Página,Nome,Acertos,Total,Porcentagem,Gabarito'];
    resultados.forEach(({pagina:p, resultado:r}) => {
        if (r) linhas.push(`${p},"${r.nome}",${r.acertos},${r.total},${Math.round(r.acertos/r.total*100)}%,"${r.gabarito}"`);
        else   linhas.push(`${p},"SEM LEITURA",,,,`);
    });
    const url = URL.createObjectURL(new Blob([linhas.join('\n')], {type:'text/csv;charset=utf-8;'}));
    Object.assign(document.createElement('a'), {href:url, download:'resultados_omr.csv'}).click();
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
