<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMR Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0e1419;
            --border: #1e2a35;
            --accent: #00e5ff;
            --accent2: #00ff9d;
            --danger: #ff3d5a;
            --text: #e8f0f5;
            --muted: #4a6070;
            --card: #111922;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── CÂMERA ── */
        #video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* ── OVERLAY GRADIENTE ── */
        .overlay-bottom {
            position: fixed; bottom: 0; left: 0; right: 0;
            height: 55%;
            background: linear-gradient(to top, rgba(8,12,16,0.97) 40%, transparent);
            z-index: 2;
            pointer-events: none;
        }

        /* ── HEADER ── */
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 20px 12px;
            background: linear-gradient(to bottom, rgba(8,12,16,0.95), transparent);
        }
        .logo {
            font-family: 'Space Mono', monospace;
            font-size: 13px;
            letter-spacing: 0.15em;
            color: var(--accent);
            text-transform: uppercase;
        }
        .logo span { color: var(--muted); }

        /* ── MIRA ── */
        .mira {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -65%);
            width: 200px; height: 200px;
            z-index: 3;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .mira.oculta { opacity: 0; }
        .mira-corner {
            position: absolute;
            width: 28px; height: 28px;
            border-color: var(--accent);
            border-style: solid;
            opacity: 0.9;
        }
        .mira-corner.tl { top: 0; left: 0; border-width: 3px 0 0 3px; border-radius: 4px 0 0 0; }
        .mira-corner.tr { top: 0; right: 0; border-width: 3px 3px 0 0; border-radius: 0 4px 0 0; }
        .mira-corner.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; border-radius: 0 0 0 4px; }
        .mira-corner.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 4px 0; }

        .mira-scan {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            animation: scan 2s ease-in-out infinite;
        }
        @keyframes scan {
            0% { top: 0; opacity: 1; }
            90% { top: 100%; opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }

        /* ── PAINEL PRINCIPAL ── */
        .painel {
            position: fixed; bottom: 0; left: 0; right: 0;
            z-index: 10;
            padding: 0 16px 24px;
        }

        /* ── STATUS PILL ── */
        .status-pill {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.08em;
            margin-bottom: 16px;
            transition: all 0.3s;
        }
        .status-dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.3s;
        }
        .status-pill.scanning .status-dot {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 1.2s ease-in-out infinite;
        }
        .status-pill.ready .status-dot {
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2);
        }
        .status-pill.frozen .status-dot {
            background: #ffd600;
            box-shadow: 0 0 8px #ffd600;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* ── CARD RESULTADO ── */
        .card-resultado {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 14px;
            display: none;
            animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .card-resultado.visivel { display: block; }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .nome-aluno {
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .nota-wrap {
            display: flex; align-items: baseline; gap: 6px;
        }
        .nota-num {
            font-family: 'Space Mono', monospace;
            font-size: 52px;
            font-weight: 700;
            line-height: 1;
            color: var(--accent2);
            letter-spacing: -2px;
        }
        .nota-den {
            font-family: 'Space Mono', monospace;
            font-size: 22px;
            color: var(--muted);
        }

        .barra-progresso {
            margin-top: 14px;
            height: 4px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }
        .barra-fill {
            height: 100%;
            border-radius: 99px;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* ── BOTÕES ── */
        .btn-row {
            display: flex; gap: 10px;
        }
        .btn {
            flex: 1;
            height: 52px;
            border: none;
            border-radius: 14px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:active { transform: scale(0.97); }

        .btn-capturar {
            background: var(--accent);
            color: var(--bg);
        }
        .btn-capturar:hover { background: #33eaff; }
        .btn-capturar:disabled {
            background: var(--border);
            color: var(--muted);
            cursor: not-allowed;
        }

        .btn-proximo {
            background: var(--accent2);
            color: var(--bg);
            display: none;
        }
        .btn-proximo:hover { background: #33ffb0; }

        /* ── CONTADOR SESSÃO ── */
        .sessao-info {
            position: fixed; top: 18px; right: 20px;
            z-index: 11;
            display: flex; gap: 12px; align-items: center;
        }
        .chip {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 5px 10px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }
        .chip strong { color: var(--text); }

        /* ── TOAST ── */
        .toast {
            position: fixed; top: 70px; left: 50%;
            transform: translateX(-50%) translateY(-10px);
            background: var(--accent2);
            color: var(--bg);
            padding: 10px 20px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 13px;
            z-index: 20;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ── HISTÓRICO ── */
        .historico-btn {
            position: fixed; top: 16px; right: 20px;
            z-index: 11;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 12px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            cursor: pointer;
            display: flex; align-items: center; gap: 6px;
            transition: all 0.2s;
        }
        .historico-btn:hover { border-color: var(--accent); color: var(--accent); }
        .historico-count {
            background: var(--accent);
            color: var(--bg);
            border-radius: 4px;
            padding: 1px 6px;
            font-weight: 700;
            font-size: 10px;
        }

        /* ── DRAWER HISTÓRICO ── */
        .drawer {
            position: fixed; inset: 0;
            z-index: 30;
            display: none;
        }
        .drawer.aberto { display: block; }
        .drawer-bg {
            position: absolute; inset: 0;
            background: rgba(8,12,16,0.8);
            backdrop-filter: blur(4px);
        }
        .drawer-panel {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            padding: 20px 20px 40px;
            max-height: 70vh;
            overflow-y: auto;
            animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .drawer-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 99px;
            margin: 0 auto 20px;
        }
        .drawer-titulo {
            font-size: 18px; font-weight: 800;
            margin-bottom: 16px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .drawer-titulo span { color: var(--muted); font-size: 13px; font-weight: 400; }

        .historico-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }
        .historico-item:last-child { border-bottom: none; }
        .hist-nome { font-size: 14px; font-weight: 600; }
        .hist-nota {
            font-family: 'Space Mono', monospace;
            font-size: 16px;
            color: var(--accent2);
        }
        .hist-pct {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .drawer-vazio {
            text-align: center;
            padding: 40px 0;
            color: var(--muted);
            font-size: 14px;
        }

        .btn-exportar {
            width: 100%;
            margin-top: 16px;
            height: 46px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-exportar:hover { border-color: var(--accent2); color: var(--accent2); }
    </style>
</head>
<body>

<video id="video" playsinline></video>
<canvas id="canvas"></canvas>
<div class="overlay-bottom"></div>

<!-- Header -->
<div class="header">
    <div class="logo">OMR<span>/</span>SCAN</div>
</div>

<!-- Botão histórico -->
<button class="historico-btn" onclick="abrirDrawer()">
    📋 <span id="hist-count-label">0</span>
    <span class="historico-count" id="hist-badge">0</span>
</button>

<!-- Mira -->
<div class="mira" id="mira">
    <div class="mira-corner tl"></div>
    <div class="mira-corner tr"></div>
    <div class="mira-corner bl"></div>
    <div class="mira-corner br"></div>
    <div class="mira-scan"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Painel -->
<div class="painel">
    <div class="status-pill scanning" id="status-pill">
        <div class="status-dot"></div>
        <span id="status-txt">AGUARDANDO QR CODE</span>
    </div>

    <div class="card-resultado" id="card-resultado">
        <div class="nome-aluno" id="res-nome">—</div>
        <div class="nota-wrap">
            <div class="nota-num" id="res-acertos">—</div>
            <div class="nota-den" id="res-total">/ —</div>
        </div>
        <div class="barra-progresso">
            <div class="barra-fill" id="barra-fill" style="width:0%"></div>
        </div>
    </div>

    <div class="btn-row">
        <button class="btn btn-capturar" id="btn-capturar" onclick="capturar()" disabled>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="4"/><path d="M3 9a2 2 0 0 1 2-2h1l2-2h8l2 2h1a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
            CAPTURAR
        </button>
        <button class="btn btn-proximo" id="btn-proximo" onclick="proximo()">
            PRÓXIMO
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
    </div>
</div>

<!-- Drawer Histórico -->
<div class="drawer" id="drawer">
    <div class="drawer-bg" onclick="fecharDrawer()"></div>
    <div class="drawer-panel">
        <div class="drawer-handle"></div>
        <div class="drawer-titulo">
            Resultados da Sessão
            <span id="drawer-resumo"></span>
        </div>
        <div id="drawer-lista">
            <div class="drawer-vazio">Nenhuma prova corrigida ainda.</div>
        </div>
        <button class="btn-exportar" onclick="exportarCSV()">
            ⬇️ Exportar CSV
        </button>
    </div>
</div>

<script>
    const video    = document.getElementById('video');
    const canvas   = document.getElementById('canvas');
    const ctx      = canvas.getContext('2d');
    const mira     = document.getElementById('mira');
    const statusPill = document.getElementById('status-pill');
    const statusTxt  = document.getElementById('status-txt');
    const cardRes    = document.getElementById('card-resultado');
    const resNome    = document.getElementById('res-nome');
    const resAcertos = document.getElementById('res-acertos');
    const resTotal   = document.getElementById('res-total');
    const barraFill  = document.getElementById('barra-fill');
    const btnCapturar = document.getElementById('btn-capturar');
    const btnProximo  = document.getElementById('btn-proximo');

    let congelado = false;
    let dadosAtuais = null;
    let imagemCongelada = null;
    let historico = [];

    const config = {
        offsetX: -2.175,
        offsetY: 1.560,
        gapH: 0.611,
        gapV: 0.335,
        colGap: 1.680,
        threshold: 81
    };

    // ── STATUS ──
    function setStatus(estado, texto) {
        statusPill.className = 'status-pill ' + estado;
        statusTxt.innerText = texto;
    }

    // ── TOAST ──
    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2000);
    }

    // ── CÂMERA ──
    async function iniciarCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment", width: { ideal: 1920 }, height: { ideal: 1080 } }
            });
            video.srcObject = stream;
            video.play();
            requestAnimationFrame(tick);
        } catch (err) {
            setStatus('', 'ERRO DE CÂMERA');
            alert("Erro de câmera: " + err);
        }
    }

    iniciarCamera();

    // ── LOOP PRINCIPAL ──
    function tick() {
        if (congelado) return;

        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.height = video.videoHeight;
            canvas.width  = video.videoWidth;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const code = jsQR(imgData.data, imgData.width, imgData.height);

            if (code) {
                const raw = code.data;
                const match = raw.match(/AL:([^|]*)\|GB:([A-E]+)/);
                if (match) {
                    processar(code, match[2], match[1], false, imgData);
                    dadosAtuais = { code, gabarito: match[2], nome: match[1] };
                    setStatus('ready', 'QR DETECTADO');
                    mira.classList.add('oculta');
                    btnCapturar.disabled = false;
                }
            } else {
                if (dadosAtuais) {
                    dadosAtuais = null;
                    btnCapturar.disabled = true;
                    setStatus('scanning', 'AGUARDANDO QR CODE');
                    mira.classList.remove('oculta');
                    cardRes.classList.remove('visivel');
                }
            }
        }
        requestAnimationFrame(tick);
    }

    // ── CAPTURAR ──
    function capturar() {
        if (!dadosAtuais) return;
        congelado = true;
        btnCapturar.style.display = 'none';
        btnProximo.style.display = 'block';
        setStatus('frozen', 'CONGELADO');
        imagemCongelada = ctx.getImageData(0, 0, canvas.width, canvas.height);
        processar(dadosAtuais.code, dadosAtuais.gabarito, dadosAtuais.nome, true, imagemCongelada);
    }

    // ── PRÓXIMO ──
    function proximo() {
        congelado = false;
        dadosAtuais = null;
        imagemCongelada = null;
        btnCapturar.style.display = 'block';
        btnCapturar.disabled = true;
        btnProximo.style.display = 'none';
        cardRes.classList.remove('visivel');
        mira.classList.remove('oculta');
        setStatus('scanning', 'AGUARDANDO QR CODE');
        requestAnimationFrame(tick);
    }

    // ── PROCESSAR ──
    function processar(qr, gabarito, nome, finalizar, pixelData) {
        const qrWidth = Math.hypot(
            qr.location.topRightCorner.x - qr.location.topLeftCorner.x,
            qr.location.topRightCorner.y - qr.location.topLeftCorner.y
        );
        const qrHeight = Math.hypot(
            qr.location.bottomLeftCorner.x - qr.location.topLeftCorner.x,
            qr.location.bottomLeftCorner.y - qr.location.topLeftCorner.y
        );
        const qrSize   = (qrWidth + qrHeight) / 2;
        const qrCenterX = (qr.location.topLeftCorner.x + qr.location.bottomRightCorner.x) / 2;
        const qrCenterY = (qr.location.topLeftCorner.y + qr.location.bottomRightCorner.y) / 2;

        const data = pixelData.data;
        const imgW = pixelData.width;
        const imgH = pixelData.height;

        let acertos = 0;

        for (let i = 0; i < gabarito.length; i++) {
            const col = Math.floor(i / 30);
            const lin = i % 30;
            const posX = config.offsetX + (col * config.colGap);
            const posY = config.offsetY + (lin * config.gapV);

            let marcada = -1;
            let maxEsc  = 0;

            for (let alt = 0; alt < 5; alt++) {
                const x = qrCenterX + qrSize * (posX + (alt * config.gapH));
                const y = qrCenterY + qrSize * posY;

                if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) continue;

                let totalEsc = 0;
                for (let dx = -1; dx <= 1; dx++) {
                    for (let dy = -1; dy <= 1; dy++) {
                        const px  = Math.min(Math.max(Math.floor(x + dx), 0), imgW - 1);
                        const py  = Math.min(Math.max(Math.floor(y + dy), 0), imgH - 1);
                        const idx = (py * imgW + px) * 4;
                        totalEsc += 255 - ((data[idx] + data[idx+1] + data[idx+2]) / 3);
                    }
                }
                const esc = totalEsc / 9;
                const marcadaEsta = esc > config.threshold;
                const correta = String.fromCharCode(65 + alt) === gabarito[i];

                // Desenha bolinha
                ctx.beginPath();
                ctx.arc(x, y, 8, 0, Math.PI * 2);
                if (marcadaEsta) {
                    ctx.fillStyle = correta ? 'rgba(0,255,157,0.85)' : 'rgba(255,61,90,0.85)';
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.15)';
                }
                ctx.fill();

                // Letra
                ctx.fillStyle = marcadaEsta ? '#080c10' : 'rgba(255,255,255,0.5)';
                ctx.font = 'bold 7px Space Mono, monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(String.fromCharCode(65 + alt), x, y);

                if (marcadaEsta && esc > maxEsc) { maxEsc = esc; marcada = alt; }
            }

            if (marcada !== -1 && String.fromCharCode(65 + marcada) === gabarito[i]) acertos++;
        }

        if (finalizar) {
            const total = gabarito.length;
            const pct   = Math.round((acertos / total) * 100);

            resNome.innerText    = nome;
            resAcertos.innerText = acertos;
            resTotal.innerText   = `/ ${total}`;
            barraFill.style.width = pct + '%';
            cardRes.classList.add('visivel');

            // Salva no histórico (evita duplicata do mesmo aluno na sessão)
            const jaExiste = historico.findIndex(h => h.nome === nome);
            const entrada = { nome, acertos, total, pct };
            if (jaExiste >= 0) historico[jaExiste] = entrada;
            else historico.push(entrada);

            atualizarBadge();
        }
    }

    // ── HISTÓRICO ──
    function atualizarBadge() {
        document.getElementById('hist-badge').innerText = historico.length;
        document.getElementById('hist-count-label').innerText = historico.length;
    }

    function abrirDrawer() {
        const lista = document.getElementById('drawer-lista');
        const resumo = document.getElementById('drawer-resumo');

        if (historico.length === 0) {
            lista.innerHTML = '<div class="drawer-vazio">Nenhuma prova corrigida ainda.</div>';
            resumo.innerText = '';
        } else {
            const media = Math.round(historico.reduce((s, h) => s + h.pct, 0) / historico.length);
            resumo.innerText = `média ${media}%`;
            lista.innerHTML = historico
                .slice().sort((a, b) => b.acertos - a.acertos)
                .map(h => `
                    <div class="historico-item">
                        <div>
                            <div class="hist-nome">${h.nome}</div>
                            <div class="hist-pct">${h.pct}% de acerto</div>
                        </div>
                        <div class="hist-nota">${h.acertos}<span style="color:var(--muted);font-size:12px">/${h.total}</span></div>
                    </div>`).join('');
        }

        document.getElementById('drawer').classList.add('aberto');
    }

    function fecharDrawer() {
        document.getElementById('drawer').classList.remove('aberto');
    }

    // ── EXPORTAR CSV ──
    function exportarCSV() {
        if (historico.length === 0) { showToast('Nenhum resultado ainda'); return; }
        const linhas = ['Nome,Acertos,Total,Porcentagem'];
        historico.forEach(h => linhas.push(`"${h.nome}",${h.acertos},${h.total},${h.pct}%`));
        const blob = new Blob([linhas.join('\n')], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href = url; a.download = 'resultados_omr.csv'; a.click();
        URL.revokeObjectURL(url);
        showToast('CSV exportado!');
    }
</script>
</body>
</html>
